<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMPILE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: #e0e0e0;
            font-family: 'Space Mono', monospace;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            max-width: 560px;
            padding: 40px 20px;
        }

        h1 {
            color: #00d4ff;
            font-size: 3.5em;
            font-family: 'Orbitron', monospace;
            font-weight: 900;
            text-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
            letter-spacing: 4px;
            margin-bottom: 8px;
        }

        .tagline {
            color: #556;
            font-size: 0.85em;
            margin-bottom: 48px;
            letter-spacing: 1px;
        }

        /* ── Dificultad ──────────────────────────────── */
        .diff-label {
            color: #ffb700;
            font-size: 0.75em;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 14px;
        }

        .diff-grid {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .diff-btn {
            flex: 1;
            background: rgba(0,0,0,0.4);
            border: 1px solid #333;
            color: #666;
            padding: 14px 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Orbitron', monospace;
            font-size: 0.62em;
            letter-spacing: 1px;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .diff-btn .diff-num {
            font-size: 1.6em;
            font-weight: 700;
            line-height: 1;
        }

        .diff-btn:hover {
            border-color: #666;
            color: #aaa;
        }

        .diff-btn.active {
            background: rgba(255, 183, 0, 0.12);
            border-color: #ffb700;
            color: #ffb700;
            box-shadow: 0 0 14px rgba(255, 183, 0, 0.25);
        }

        .diff-desc {
            font-size: 0.78em;
            color: #667;
            min-height: 2.4em;
            margin-bottom: 36px;
            line-height: 1.5;
        }

        /* ── Botón jugar ─────────────────────────────── */
        .btn-play {
            width: 100%;
            padding: 20px;
            font-size: 1.1em;
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            letter-spacing: 2px;
            border: 2px solid #00d4ff;
            border-radius: 8px;
            background: transparent;
            color: #00d4ff;
            cursor: pointer;
            transition: all 0.25s;
            margin-bottom: 32px;
        }

        .btn-play:hover {
            background: rgba(0, 212, 255, 0.15);
            box-shadow: 0 0 24px rgba(0, 212, 255, 0.35);
            transform: translateY(-2px);
        }

        .version {
            color: #334;
            font-size: 0.72em;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>COMPILE</h1>
    <p class="tagline">Juego de cartas · IA adaptativa</p>

    <p class="diff-label">⚙️ Nivel de compilación</p>
    <div class="diff-grid" id="diff-grid"></div>
    <p class="diff-desc" id="diff-desc"></p>

    <button class="btn-play" id="btn-play">🎮 INICIAR DRAFT</button>

    <div class="version">v2.1 — 2026</div>
</div>

<script>
const DIFFICULTY_LEVELS = [
    { id: 1, name: 'SUBRUTINA',    depth: 1, desc: 'IA básica. Ejecuta protocolos sin análisis profundo.' },
    { id: 2, name: 'ALGORITMO',    depth: 2, desc: 'IA táctica. Anticipa tus jugadas inmediatas.' },
    { id: 3, name: 'NÚCLEO',       depth: 3, desc: 'IA estándar. Equilibrio entre velocidad y estrategia.' },
    { id: 4, name: 'CENTINELA',    depth: 4, desc: 'IA avanzada. Analiza múltiples futuros para bloquearte.' },
    { id: 5, name: 'SINGULARIDAD', depth: 5, desc: 'IA total. Máxima capacidad de cómputo y predicción.' }
];

let selected = 3;

function renderDiff() {
    const grid = document.getElementById('diff-grid');
    grid.innerHTML = '';
    DIFFICULTY_LEVELS.forEach(l => {
        const btn = document.createElement('button');
        btn.className = 'diff-btn' + (l.id === selected ? ' active' : '');
        btn.innerHTML = `<span class="diff-num">${l.id}</span>${l.name}`;
        btn.onclick = () => {
            selected = l.id;
            renderDiff();
            document.getElementById('diff-desc').textContent = l.desc;
        };
        grid.appendChild(btn);
    });
    document.getElementById('diff-desc').textContent =
        DIFFICULTY_LEVELS.find(l => l.id === selected).desc;
}

renderDiff();

document.getElementById('btn-play').addEventListener('click', () => {
    const diff = DIFFICULTY_LEVELS.find(l => l.id === selected);
    sessionStorage.setItem('aiDifficultyDepth', diff.depth);
    sessionStorage.setItem('aiDifficultyName', diff.name);
    window.location.href = 'draft.html';
});
</script>

</body>
</html>
