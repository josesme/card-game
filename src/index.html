<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMPILE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: #e0e0e0;
            font-family: 'Space Mono', monospace;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            max-width: 740px;
            padding: 60px 40px;
        }

        h1 {
            color: #00d4ff;
            font-size: 5em;
            font-family: 'Orbitron', monospace;
            font-weight: 900;
            text-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
            letter-spacing: 6px;
            margin-bottom: 12px;
        }

        .tagline {
            color: #778;
            font-size: 1em;
            margin-bottom: 60px;
            letter-spacing: 2px;
        }

        /* ── Dificultad ──────────────────────────────── */
        .diff-label {
            color: #ffb700;
            font-size: 0.9em;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .diff-grid {
            display: flex;
            gap: 14px;
            margin-bottom: 16px;
        }

        .diff-btn {
            flex: 0 0 calc((740px - 80px - 4 * 14px) / 5);
            background: rgba(0,0,0,0.4);
            border: 1px solid #333;
            color: #666;
            padding: 22px 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Orbitron', monospace;
            font-size: 0.75em;
            letter-spacing: 1px;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .diff-icon {
            font-size: 2.4em;
            line-height: 1;
        }

        .diff-name {
            font-size: 0.75em;
            letter-spacing: 1px;
        }

        .diff-btn:hover {
            border-color: #666;
            color: #aaa;
        }

        .diff-btn.active {
            background: rgba(var(--c), 0.12);
            border-color: rgb(var(--c));
            color: rgb(var(--c));
            box-shadow: 0 0 18px rgba(var(--c), 0.3);
        }

        .diff-desc {
            font-size: 0.95em;
            color: #667;
            height: 3.2em;
            margin-bottom: 48px;
            line-height: 1.6;
            overflow: hidden;
        }

        /* ── Botón jugar ─────────────────────────────── */
        .btn-play {
            width: 100%;
            padding: 26px;
            font-size: 1.3em;
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            letter-spacing: 3px;
            border: 2px solid #00d4ff;
            border-radius: 8px;
            background: transparent;
            color: #00d4ff;
            cursor: pointer;
            transition: all 0.25s;
            margin-bottom: 40px;
        }

        .btn-play:hover {
            background: rgba(0, 212, 255, 0.15);
            box-shadow: 0 0 28px rgba(0, 212, 255, 0.35);
            transform: translateY(-2px);
        }

        .version {
            color: #445;
            font-size: 0.8em;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>COMPILE</h1>
    <p class="tagline">Juego de cartas · IA adaptativa</p>

    <p class="diff-label">⚙️ Nivel de compilación</p>
    <div class="diff-grid" id="diff-grid"></div>
    <p class="diff-desc" id="diff-desc"></p>

    <button class="btn-play" id="btn-play">🎮 INICIAR DRAFT</button>

    <div class="version">v2.1 — 2026</div>
</div>

<script>
const DIFFICULTY_LEVELS = [
    { id: 1, name: 'SUBRUTINA',    icon: '⬡', color: '34,197,94',   depth: 1, desc: 'IA básica. Ejecuta protocolos sin análisis profundo.' },
    { id: 2, name: 'ALGORITMO',    icon: '◈', color: '6,182,212',   depth: 2, desc: 'IA táctica. Anticipa tus jugadas inmediatas.' },
    { id: 3, name: 'NÚCLEO',       icon: '⬢', color: '234,179,8',   depth: 3, desc: 'IA estándar. Equilibrio entre velocidad y estrategia.' },
    { id: 4, name: 'CENTINELA',    icon: '◉', color: '249,115,22',  depth: 4, desc: 'IA avanzada. Analiza múltiples futuros para bloquearte.' },
    { id: 5, name: 'SINGULARIDAD', icon: '✦', color: '239,68,68',   depth: 5, desc: 'IA total. Máxima capacidad de cómputo y predicción.' }
];

let selected = 3;

function renderDiff() {
    const grid = document.getElementById('diff-grid');
    grid.innerHTML = '';
    DIFFICULTY_LEVELS.forEach(l => {
        const btn = document.createElement('button');
        btn.className = 'diff-btn' + (l.id === selected ? ' active' : '');
        btn.style.setProperty('--c', l.color);
        btn.innerHTML = `<span class="diff-icon">${l.icon}</span><span class="diff-name">${l.name}</span>`;
        btn.onclick = () => {
            selected = l.id;
            renderDiff();
            const d = DIFFICULTY_LEVELS.find(x => x.id === selected);
            const desc = document.getElementById('diff-desc');
            desc.textContent = d.desc;
            desc.style.color = `rgb(${d.color})`;
        };
        grid.appendChild(btn);
    });
    const cur = DIFFICULTY_LEVELS.find(l => l.id === selected);
    const desc = document.getElementById('diff-desc');
    desc.textContent = cur.desc;
    desc.style.color = `rgb(${cur.color})`;
}

renderDiff();

document.getElementById('btn-play').addEventListener('click', () => {
    const diff = DIFFICULTY_LEVELS.find(l => l.id === selected);
    sessionStorage.setItem('aiDifficultyDepth', diff.depth);
    sessionStorage.setItem('aiDifficultyName', diff.name);
    sessionStorage.setItem('aiDifficultyColor', diff.color);
    sessionStorage.setItem('aiDifficultyIcon', diff.icon);
    window.location.href = 'draft.html';
});
</script>

</body>
</html>
