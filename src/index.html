<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMPILE</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Orbitron:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="design-tokens.css">
    <link rel="stylesheet" href="ui-components.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: url('../images/Background/Compile_2.png') no-repeat center center fixed;
            background-size: cover;
            color: #e0e0e0;
            font-family: 'JetBrains Mono', monospace;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 14, 39, 0.7); /* Oscurece la imagen para legibilidad */
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            max-width: 800px;
            padding: 60px 50px;
            background: rgba(15, 20, 45, 0.5); /* Fondo sutil para el contenido */
            backdrop-filter: blur(10px); /* Efecto cristal */
            border-radius: 24px;
            border: 1px solid rgba(0, 245, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .title-img {
            max-width: 100%;
            height: auto;
            max-height: 180px;
            filter: drop-shadow(0 0 20px rgba(255, 217, 61, 0.4));
            margin-bottom: 24px;
        }

        .tagline {
            color: #00f5ff;
            font-size: 9px;
            font-weight: 600;
            margin-bottom: 60px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* ── Dificultad ──────────────────────────────── */
        .diff-label {
            color: #00f5ff;
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .diff-grid {
            display: grid;
            grid-template-columns: repeat(5, minmax(min-content, 1fr));
            gap: 14px;
            margin-bottom: 16px;
        }

        .diff-btn {
            height: 90px;
            background: rgba(6,14,28,0.55);
            border: 1px solid rgba(255,255,255,0.09);
            color: #64748b;
            padding: 0 8px;
            cursor: pointer;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 1px;
            border-radius: 8px;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            overflow: hidden;
        }

        .diff-icon {
            font-size: 2.4em;
            line-height: 1;
        }

        .diff-name {
            font-size: 9px;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        .diff-btn:hover {
            border-color: rgba(0,245,255,0.25);
            color: #94a3b8;
        }

        .diff-btn.active {
            background: rgba(var(--c), 0.12);
            border-color: rgb(var(--c));
            color: rgb(var(--c));
            box-shadow: 0 0 18px rgba(var(--c), 0.3);
        }

        .diff-desc-wrapper {
            position: relative;
            height: 2.8em;
            margin-bottom: 24px;
            overflow: hidden;
        }

        .diff-desc {
            position: absolute;
            inset: 0;
            font-size: 10px;
            color: #e0e0e0;
            line-height: 1.6;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        /* ── Protocolos ─────────────────────────────── */
        .protocol-grid {
            display: flex;
            gap: 14px;
            margin-bottom: 48px;
        }

        .protocol-btn {
            flex: 1;
            background: rgba(6,14,28,0.55);
            border: 1px solid rgba(255,255,255,0.09);
            color: #64748b;
            padding: 16px 8px;
            cursor: pointer;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 2px;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .protocol-btn:hover {
            border-color: rgba(0,245,255,0.25);
            color: #94a3b8;
        }

        .protocol-btn.active {
            background: rgba(var(--c), 0.12);
            border-color: rgb(var(--c));
            color: rgb(var(--c));
            box-shadow: 0 0 18px rgba(var(--c), 0.3);
        }

        #proto-all.active {
            background: linear-gradient(to right, rgba(168, 85, 247, 0.12), rgba(234, 179, 8, 0.12));
            border-color: transparent;
            box-shadow: inset 0 0 0 1px rgba(168, 85, 247, 0.7), 0 0 18px rgba(168, 85, 247, 0.2);
            color: #e0e0e0;
        }

        #diff-nucleo.active {
            background: linear-gradient(to right, rgba(114, 46, 154, 0.12), rgba(245, 189, 31, 0.12));
            border-color: transparent;
            box-shadow: inset 0 0 0 1px rgba(114, 46, 154, 0.7), 0 0 18px rgba(114, 46, 154, 0.2);
            color: #e0e0e0;
        }

        /* ── Reglas opcionales ──────────────────────── */
        .rules-label {
            color: #00f5ff;
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .rules-grid {
            display: flex;
            gap: 14px;
            margin-bottom: 36px;
        }

        .rule-btn {
            flex: 1;
            background: rgba(6,14,28,0.55);
            border: 1px solid rgba(255,255,255,0.09);
            color: #64748b;
            padding: 14px 12px;
            cursor: pointer;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 1px;
            border-radius: 8px;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .rule-btn:hover {
            border-color: rgba(0,245,255,0.2);
            color: #94a3b8;
        }

        .rule-btn.active {
            background: rgba(0,245,255,0.08);
            border-color: rgba(0,245,255,0.5);
            color: #00f5ff;
            box-shadow: 0 0 14px rgba(0,245,255,0.2);
        }

        .rule-icon {
            font-size: 1.6em;
            line-height: 1;
        }

        .rule-name {
            font-size: 9px;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        .rule-subdesc {
            font-size: 8px;
            letter-spacing: 0.5px;
            opacity: 0.6;
            white-space: nowrap;
        }

        /* ── Botón COMENZAR JUEGO — estilos explícitos para garantizar igualdad con draft ── */
        #btn-play {
            padding: 0 20px;
            height: 36px;
            cursor: pointer;
            font-weight: 700;
            font-size: 11px;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 2px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #030712;
            color: #00f5ff;
            border: 1px solid rgba(0,245,255,0.4);
            box-shadow: 0 0 12px rgba(0,245,255,0.33), 0 0 2px rgba(0,245,255,0.55);
            transition: all 0.25s;
        }
        #btn-play:hover {
            background: #00f5ff;
            color: #030712;
            border-color: #00f5ff;
            box-shadow: none;
        }
        #btn-play:disabled {
            background: #060e1c;
            color: #334155;
            border-color: #1e3a5f;
            box-shadow: none;
            cursor: not-allowed;
        }

        .version {
            color: var(--ui-text-muted);
            font-size: 8px;
            letter-spacing: 1px;
            margin-top: 16px;
        }

        #btn-fullscreen {
            position: fixed;
            top: 12px; right: 16px;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--ui-bg);
            border: 1.5px solid var(--ui-cyan);
            border-radius: 8px;
            cursor: pointer;
            padding: 0;
            z-index: 100;
            box-shadow: 0 0 12px var(--ui-cyan-glow), 0 0 3px rgba(0,245,255,0.55);
            transition: box-shadow 0.25s, background 0.25s;
        }
        #btn-fullscreen svg {
            width: 22px;
            height: 22px;
            stroke: var(--ui-cyan);
            stroke-width: 2;
            fill: none;
            filter: drop-shadow(0 0 8px rgba(0,245,255,0.66));
        }
        #btn-fullscreen:hover {
            background: #061220;
            box-shadow: 0 0 18px rgba(0,245,255,0.5), 0 0 6px rgba(0,245,255,0.7);
        }

        #index-container {
            transform-origin: center center;
        }
    </style>
</head>
<body>

<button id="btn-fullscreen" onclick="toggleFullscreen()" title="Pantalla completa">
    <svg id="fs-icon-expand" viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></svg>
    <svg id="fs-icon-shrink" viewBox="0 0 24 24" style="display:none"><path d="M4 14h6v6"/><path d="M20 10h-6V4"/><path d="M14 10l7-7"/><path d="M3 21l7-7"/></svg>
</button>
<div class="container" id="index-container">
    <img src="../images/Background/Compile.png" class="title-img" alt="COMPILE">
    <p class="tagline" id="tagline-text">Juego de cartas · IA adaptativa</p>

    <p class="diff-label" id="diff-label-1">Nivel de compilación</p>
    <div class="diff-grid" id="diff-grid"></div>
    <div class="diff-desc-wrapper"><p class="diff-desc" id="diff-desc"></p></div>

    <p class="diff-label" id="diff-label-2">Protocolos disponibles</p>
    <div class="protocol-grid">
        <button class="protocol-btn" id="proto-1" style="--c: 168, 85, 247;">
            <span class="protocol-name" data-text="MAIN 1">MAIN 1</span>
        </button>
        <button class="protocol-btn" id="proto-2" style="--c: 234, 179, 8;">
            <span class="protocol-name" data-text="MAIN 2">MAIN 2</span>
        </button>
        <button class="protocol-btn" id="proto-all" style="--c: gradient;">
            <span class="protocol-name" data-text="MAIN 1 + 2">MAIN 1 + 2</span>
        </button>
    </div>

    <p class="rules-label" id="rules-label">Reglas opcionales</p>
    <div class="rules-grid">
        <button class="rule-btn" id="rule-control" onclick="toggleRule('control')">
            <span class="rule-icon">△</span>
            <span class="rule-name" data-text="CONTROL COMPONENT">CONTROL COMPONENT</span>
            <span class="rule-subdesc" data-text="≥2 líneas → reorganiza protocolos">≥2 líneas → reorganiza protocolos</span>
        </button>
    </div>

    <div style="display: flex; gap: 12px; justify-content: center; align-items: center; margin-top: 0;">
        <button class="ui-btn" id="btn-play">COMENZAR JUEGO</button>
    </div>

    <div class="version" id="version-text">v2.2.0 — 2026</div>
</div>

<!-- GSAP + ScrambleText -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
    console.log('[GSAP Check]', { gsap: typeof gsap, version: gsap ? gsap.version : 'not loaded' });
</script>
<script src="ScrambleText.min.js"></script>
<script>
    console.log('[ScrambleText Check]', { plugin: typeof ScrambleTextPlugin });
</script>
<script>
// Register ScrambleTextPlugin
if (typeof ScrambleTextPlugin !== 'undefined' && typeof gsap !== 'undefined') {
    gsap.registerPlugin(ScrambleTextPlugin);
}

// Define scrTxt helper directly (from animations.js)
window.scrTxt = function (el, text, opts) {
    if (typeof el === 'string') el = document.getElementById(el);
    if (!el) return;
    var t = (text === undefined || text === null) ? '' : String(text);
    if (el.getAttribute('data-scr-last') === t) return;
    el.setAttribute('data-scr-last', t);
    if (typeof ScrambleTextPlugin === 'undefined' || typeof gsap === 'undefined') {
        el.textContent = t; return;
    }
    var dur   = (opts && opts.duration !== undefined) ? opts.duration : 1.0;
    var chars = (opts && opts.chars)   || 'upperCase';
    var speed = (opts && opts.speed)   || 0.5;
    gsap.to(el, { duration: dur, scrambleText: { text: t, chars: chars, speed: speed, revealDelay: 0 } });
};

// Apply scramble effect on page load
window.addEventListener('load', function() {
    setTimeout(function() {
        // Scramble tagline
        if (window.scrTxt && typeof gsap !== 'undefined') {
            console.log('[Scramble] Applying to tagline and version...');
            window.scrTxt('tagline-text', 'Juego de cartas · IA adaptativa', { duration: 1.0, chars: 'upperAndLowerCase' });
            window.scrTxt('version-text', 'v2.2.0 — 2026', { duration: 1.0, chars: '0123456789' });
        } else {
            console.log('[Scramble] Not available:', { scrTxt: !!window.scrTxt, gsap: typeof gsap });
        }
    }, 500);
});

// Apply scramble to diff labels after render
function applyDiffScramble() {
    if (window.scrTxt && typeof gsap !== 'undefined') {
        console.log('[Scramble] Applying to all diff elements...');
        window.scrTxt('diff-label-1', 'Nivel de compilación', { duration: 1.0, chars: 'upperCase' });
        window.scrTxt('diff-label-2', 'Protocolos disponibles', { duration: 1.0, chars: 'upperCase' });
        // Scramble difficulty descriptions
        var diffDescEl = document.getElementById('diff-desc');
        if (diffDescEl && diffDescEl.textContent) {
            window.scrTxt(diffDescEl, diffDescEl.textContent, { duration: 1.0, chars: 'upperAndLowerCase' });
        }
        // Scramble difficulty button names using data-text attribute
        document.querySelectorAll('.diff-name').forEach(function(el) {
            var originalText = el.getAttribute('data-text');
            if (originalText) {
                el.textContent = originalText;
                window.scrTxt(el, originalText, { duration: 1.0, chars: 'upperCase' });
            }
        });
    }
}
setTimeout(applyDiffScramble, 500);
</script>

<script>
const DIFFICULTY_LEVELS = [
    { id: 1, name: 'SUBRUTINA',    icon: '⬡', color: '114,46,154',  depth: 1, desc: 'IA básica. Ejecuta protocolos sin análisis profundo.' },
    { id: 2, name: 'ALGORITMO',    icon: '◈', color: '71,41,123',   depth: 2, desc: 'IA táctica. Anticipa tus jugadas inmediatas.' },
    { id: 3, name: 'NÚCLEO',       icon: '⬢', color: '114,46,154',  depth: 3, desc: 'IA estándar. Equilibrio entre velocidad y estrategia.' },
    { id: 4, name: 'CENTINELA',    icon: '◉', color: '255,232,99',  depth: 4, desc: 'IA avanzada. Analiza múltiples futuros para bloquearte.' },
    { id: 5, name: 'SINGULARIDAD', icon: '✦', color: '245,189,31',  depth: 5, desc: 'IA total. Máxima capacidad de cómputo y predicción.' }
];

let selectedDifficulty = 3;
let selectedProtocols = null; // 1, 2, or 'all'
const activeRules = new Set(); // disabled by default

function toggleRule(id) {
    if (activeRules.has(id)) activeRules.delete(id);
    else activeRules.add(id);
    document.getElementById('rule-' + id).classList.toggle('active', activeRules.has(id));
}

function renderDiff() {
    const grid = document.getElementById('diff-grid');
    grid.innerHTML = '';
    DIFFICULTY_LEVELS.forEach(l => {
        const btn = document.createElement('button');
        btn.className = 'diff-btn' + (l.id === selectedDifficulty ? ' active' : '');
        if (l.id === 3) btn.id = 'diff-nucleo';
        btn.style.setProperty('--c', l.color);
        btn.innerHTML = `<span class="diff-icon">${l.icon}</span><span class="diff-name" data-text="${l.name}">${l.name}</span>`;
        btn.onclick = () => {
            selectedDifficulty = l.id;
            renderDiff();
            // Apply scramble to all text elements on difficulty change
            applyDiffScramble();
        };
        grid.appendChild(btn);
    });
    const cur = DIFFICULTY_LEVELS.find(l => l.id === selectedDifficulty);
    const desc = document.getElementById('diff-desc');
    desc.textContent = cur.desc;

    // Apply scramble to difficulty name and description
    if (window.scrTxt) {
        setTimeout(function() {
            window.scrTxt(desc, cur.desc, { duration: 1.0, chars: 'upperAndLowerCase' });
        }, 50);
    }
}

function updateProtocolSelection() {
    document.querySelectorAll('.protocol-btn').forEach(btn => btn.classList.remove('active'));
    if (selectedProtocols === 1) document.getElementById('proto-1').classList.add('active');
    if (selectedProtocols === 2) document.getElementById('proto-2').classList.add('active');
    if (selectedProtocols === 'all') document.getElementById('proto-all').classList.add('active');

    document.getElementById('btn-play').disabled = selectedProtocols === null;
    
    // Apply scramble to protocol names when selection changes
    setTimeout(function() {
        if (window.scrTxt && typeof gsap !== 'undefined') {
            // Scramble protocol names using data-text attribute
            document.querySelectorAll('.protocol-name').forEach(function(el) {
                var originalText = el.getAttribute('data-text');
                if (originalText) {
                    // Reset textContent to original before scrambling
                    el.textContent = originalText;
                    window.scrTxt(el, originalText, { duration: 1.0, chars: 'upperCase' });
                }
            });
        }
    }, 50);
}

document.getElementById('proto-1').onclick = () => { selectedProtocols = 1; updateProtocolSelection(); };
document.getElementById('proto-2').onclick = () => { selectedProtocols = 2; updateProtocolSelection(); };
document.getElementById('proto-all').onclick = () => { selectedProtocols = 'all'; updateProtocolSelection(); };

renderDiff();
updateProtocolSelection();

function setFsIcons(isFs) {
    document.getElementById('fs-icon-expand').style.display = isFs ? 'none' : '';
    document.getElementById('fs-icon-shrink').style.display = isFs ? '' : 'none';
}
function toggleFullscreen() {
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(() => {});
        setFsIcons(true);
        sessionStorage.setItem('fs', '1');
    } else {
        document.exitFullscreen().catch(() => {});
        setFsIcons(false);
        sessionStorage.removeItem('fs');
    }
}
document.addEventListener('fullscreenchange', () => {
    if (document.fullscreenElement) {
        setFsIcons(true);
    } else {
        setFsIcons(false);
        sessionStorage.removeItem('fs');
    }
});
if (sessionStorage.getItem('fs') === '1') {
    document.documentElement.requestFullscreen().catch(() => {
        document.addEventListener('click', function restoreFs() {
            if (sessionStorage.getItem('fs') === '1' && !document.fullscreenElement)
                document.documentElement.requestFullscreen().catch(() => sessionStorage.removeItem('fs'));
            document.removeEventListener('click', restoreFs);
        });
    });
}

function applyIndexScale() {
    const container = document.getElementById('index-container');
    container.style.transform = 'none';
    const contentH = container.offsetHeight;
    const contentW = container.offsetWidth;
    const viewH    = window.innerHeight - 40;
    const viewW    = window.innerWidth  - 80;
    const scale    = Math.min(viewH / contentH, viewW / contentW);
    if (Math.abs(scale - 1) > 0.01) {
        container.style.transform = `scale(${scale.toFixed(4)})`;
    }
}
window.addEventListener('load', applyIndexScale);
window.addEventListener('resize', applyIndexScale);

// Apply scramble to diff labels after render
function applyDiffScramble() {
    if (window.scrTxt) {
        window.scrTxt('diff-label-1', 'Nivel de compilación', { duration: 1.0, chars: 'upperCase' });
        window.scrTxt('diff-label-2', 'Protocolos disponibles', { duration: 1.0, chars: 'upperCase' });
        window.scrTxt('rules-label', 'Reglas opcionales', { duration: 1.0, chars: 'upperCase' });
        var diffDescEl = document.getElementById('diff-desc');
        if (diffDescEl && diffDescEl.textContent) {
            window.scrTxt(diffDescEl, diffDescEl.textContent, { duration: 1.0, chars: 'upperAndLowerCase' });
        }
        document.querySelectorAll('.protocol-name').forEach(function(el) {
            var txt = el.textContent.trim();
            if (txt) window.scrTxt(el, txt, { duration: 1.0, chars: 'upperCase' });
        });
        document.querySelectorAll('.rule-name').forEach(function(el) {
            var txt = el.getAttribute('data-text') || el.textContent.trim();
            if (txt) window.scrTxt(el, txt, { duration: 1.0, chars: 'upperCase' });
        });
    }
}
setTimeout(applyDiffScramble, 500);

document.getElementById('btn-play').addEventListener('click', () => {
    const diff = DIFFICULTY_LEVELS.find(l => l.id === selectedDifficulty);
    sessionStorage.setItem('aiDifficultyDepth', diff.depth);
    sessionStorage.setItem('aiDifficultyName', diff.name);
    sessionStorage.setItem('aiDifficultyColor', diff.color);
    sessionStorage.setItem('aiDifficultyIcon', diff.icon);
    sessionStorage.setItem('selectedProtocols', selectedProtocols);
    sessionStorage.setItem('ruleControlComponent', activeRules.has('control') ? '1' : '0');
    window.location.href = '/src/draft.html';
});

</script>

</body>
</html>
