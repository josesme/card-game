<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMPILE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: url('../images/background.png') no-repeat center center fixed;
            background-size: cover;
            color: #e0e0e0;
            font-family: 'Space Mono', monospace;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 14, 39, 0.7); /* Oscurece la imagen para legibilidad */
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            max-width: 800px;
            padding: 60px 50px;
            background: rgba(15, 20, 45, 0.5); /* Fondo sutil para el contenido */
            backdrop-filter: blur(10px); /* Efecto cristal */
            border-radius: 24px;
            border: 1px solid rgba(0, 212, 255, 0.15);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .title-img {
            max-width: 100%;
            height: auto;
            max-height: 180px;
            filter: drop-shadow(0 0 20px rgba(0, 212, 255, 0.4));
            margin-bottom: 24px;
        }

        .tagline {
            color: #778;
            font-size: 1em;
            margin-bottom: 60px;
            letter-spacing: 2px;
        }

        /* ── Dificultad ──────────────────────────────── */
        .diff-label {
            color: #ffb700;
            font-size: 0.9em;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .diff-grid {
            display: flex;
            gap: 14px;
            margin-bottom: 16px;
        }

        .diff-btn {
            flex: 1;
            height: 90px;
            background: rgba(0,0,0,0.4);
            border: 1px solid #333;
            color: #666;
            padding: 0 8px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Orbitron', monospace;
            font-size: 0.75em;
            letter-spacing: 1px;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            overflow: hidden;
        }

        .diff-icon {
            font-size: 2.4em;
            line-height: 1;
        }

        .diff-name {
            font-size: 0.68em;
            letter-spacing: 0px;
            white-space: nowrap;
        }

        .diff-btn:hover {
            border-color: #666;
            color: #aaa;
        }

        .diff-btn.active {
            background: rgba(var(--c), 0.12);
            border-color: rgb(var(--c));
            color: rgb(var(--c));
            box-shadow: 0 0 18px rgba(var(--c), 0.3);
        }

        .diff-desc {
            font-size: 0.95em;
            color: #667;
            height: 2.6em;
            margin-bottom: 24px;
            line-height: 1.6;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        /* ── Protocolos ─────────────────────────────── */
        .protocol-grid {
            display: flex;
            gap: 14px;
            margin-bottom: 48px;
        }

        .protocol-btn {
            flex: 1;
            background: rgba(0,0,0,0.4);
            border: 1px solid #333;
            color: #666;
            padding: 16px 8px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Orbitron', monospace;
            font-size: 0.75em;
            letter-spacing: 1px;
            transition: all 0.2s;
        }

        .protocol-btn:hover {
            border-color: #666;
            color: #aaa;
        }

        .protocol-btn.active {
            background: rgba(var(--c), 0.12);
            border-color: rgb(var(--c));
            color: rgb(var(--c));
            box-shadow: 0 0 18px rgba(var(--c), 0.3);
        }

        #proto-all.active {
            background: linear-gradient(to right, rgba(168, 85, 247, 0.12), rgba(234, 179, 8, 0.12));
            border-image: linear-gradient(to right, #a855f7, #eab308) 1;
            color: #e0e0e0;
            box-shadow: 0 0 18px rgba(168, 85, 247, 0.2);
        }

        /* ── Botón jugar ─────────────────────────────── */
        .btn-play {
            width: 100%;
            padding: 26px;
            font-size: 1.3em;
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            letter-spacing: 3px;
            border: 2px solid #00d4ff;
            border-radius: 8px;
            background: transparent;
            color: #00d4ff;
            cursor: pointer;
            transition: all 0.25s;
            margin-bottom: 40px;
        }

        .btn-play:hover:not(:disabled) {
            background: rgba(0, 212, 255, 0.15);
            box-shadow: 0 0 28px rgba(0, 212, 255, 0.35);
            transform: translateY(-2px);
        }

        .btn-play:disabled {
            border-color: #334;
            color: #334;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .version {
            color: #445;
            font-size: 0.8em;
        }

        #btn-fullscreen {
            position: fixed;
            top: 12px; right: 16px;
            background: rgba(0,212,255,0.1);
            border: 1px solid #00d4ff;
            color: #00d4ff;
            border-radius: 8px;
            padding: 8px 14px;
            cursor: pointer;
            font-family: 'Orbitron', monospace;
            font-size: 0.75em;
            letter-spacing: 1px;
            transition: background 0.2s;
            z-index: 100;
        }
        #btn-fullscreen:hover { background: rgba(0,212,255,0.25); }

        #index-container {
            transform-origin: center center;
        }
    </style>
</head>
<body>

<button id="btn-fullscreen" onclick="toggleFullscreen()" title="Pantalla completa">⛶ FULLSCREEN</button>
<div class="container" id="index-container">
    <img src="../images/compile.png" class="title-img" alt="COMPILE">
    <p class="tagline">Juego de cartas · IA adaptativa</p>

    <p class="diff-label">⚙️ Nivel de compilación</p>
    <div class="diff-grid" id="diff-grid"></div>
    <p class="diff-desc" id="diff-desc"></p>

    <p class="diff-label">🧬 Protocolos disponibles</p>
    <div class="protocol-grid">
        <button class="protocol-btn" id="proto-1" style="--c: 168, 85, 247;">
            <span class="protocol-name">MAIN 1</span>
        </button>
        <button class="protocol-btn" id="proto-2" style="--c: 234, 179, 8;">
            <span class="protocol-name">MAIN 2</span>
        </button>
        <button class="protocol-btn" id="proto-all" style="--c: gradient;">
            <span class="protocol-name">MAIN 1 + 2</span>
        </button>
    </div>

    <button class="btn-play" id="btn-play" disabled>🎮 INICIAR DRAFT</button>

    <div class="version">v2.1 — 2026</div>
</div>

<script>
const DIFFICULTY_LEVELS = [
    { id: 1, name: 'SUBRUTINA',    icon: '⬡', color: '34,197,94',   depth: 1, desc: 'IA básica. Ejecuta protocolos sin análisis profundo.' },
    { id: 2, name: 'ALGORITMO',    icon: '◈', color: '6,182,212',   depth: 2, desc: 'IA táctica. Anticipa tus jugadas inmediatas.' },
    { id: 3, name: 'NÚCLEO',       icon: '⬢', color: '234,179,8',   depth: 3, desc: 'IA estándar. Equilibrio entre velocidad y estrategia.' },
    { id: 4, name: 'CENTINELA',    icon: '◉', color: '249,115,22',  depth: 4, desc: 'IA avanzada. Analiza múltiples futuros para bloquearte.' },
    { id: 5, name: 'SINGULARIDAD', icon: '✦', color: '239,68,68',   depth: 5, desc: 'IA total. Máxima capacidad de cómputo y predicción.' }
];

let selectedDifficulty = 3;
let selectedProtocols = null; // 1, 2, or 'all'

function renderDiff() {
    const grid = document.getElementById('diff-grid');
    grid.innerHTML = '';
    DIFFICULTY_LEVELS.forEach(l => {
        const btn = document.createElement('button');
        btn.className = 'diff-btn' + (l.id === selectedDifficulty ? ' active' : '');
        btn.style.setProperty('--c', l.color);
        btn.innerHTML = `<span class="diff-icon">${l.icon}</span><span class="diff-name">${l.name}</span>`;
        btn.onclick = () => {
            selectedDifficulty = l.id;
            renderDiff();
        };
        grid.appendChild(btn);
    });
    const cur = DIFFICULTY_LEVELS.find(l => l.id === selectedDifficulty);
    const desc = document.getElementById('diff-desc');
    desc.textContent = cur.desc;
    desc.style.color = `rgb(${cur.color})`;
    applyIndexScale();
}

function updateProtocolSelection() {
    document.querySelectorAll('.protocol-btn').forEach(btn => btn.classList.remove('active'));
    if (selectedProtocols === 1) document.getElementById('proto-1').classList.add('active');
    if (selectedProtocols === 2) document.getElementById('proto-2').classList.add('active');
    if (selectedProtocols === 'all') document.getElementById('proto-all').classList.add('active');
    
    document.getElementById('btn-play').disabled = selectedProtocols === null;
}

document.getElementById('proto-1').onclick = () => { selectedProtocols = 1; updateProtocolSelection(); };
document.getElementById('proto-2').onclick = () => { selectedProtocols = 2; updateProtocolSelection(); };
document.getElementById('proto-all').onclick = () => { selectedProtocols = 'all'; updateProtocolSelection(); };

renderDiff();

function toggleFullscreen() {
    const btn = document.getElementById('btn-fullscreen');
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(() => {});
        btn.textContent = '✕ SALIR';
    } else {
        document.exitFullscreen().catch(() => {});
        btn.textContent = '⛶ FULLSCREEN';
    }
}
document.addEventListener('fullscreenchange', () => {
    const btn = document.getElementById('btn-fullscreen');
    if (!document.fullscreenElement) btn.textContent = '⛶ FULLSCREEN';
});

function applyIndexScale() {
    const container = document.getElementById('index-container');
    container.style.transform = 'none';
    const contentH = container.offsetHeight;
    const contentW = container.offsetWidth;
    const viewH    = window.innerHeight - 40;
    const viewW    = window.innerWidth  - 80;
    const scale    = Math.min(viewH / contentH, viewW / contentW);
    if (Math.abs(scale - 1) > 0.01) {
        container.style.transform = `scale(${scale.toFixed(4)})`;
    }
}
window.addEventListener('load', applyIndexScale);
window.addEventListener('resize', applyIndexScale);

document.getElementById('btn-play').addEventListener('click', () => {
    const diff = DIFFICULTY_LEVELS.find(l => l.id === selectedDifficulty);
    sessionStorage.setItem('aiDifficultyDepth', diff.depth);
    sessionStorage.setItem('aiDifficultyName', diff.name);
    sessionStorage.setItem('aiDifficultyColor', diff.color);
    sessionStorage.setItem('aiDifficultyIcon', diff.icon);
    sessionStorage.setItem('selectedProtocols', selectedProtocols);
    window.location.href = '/src/draft.html';
});
</script>

</body>
</html>
