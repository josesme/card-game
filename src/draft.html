<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMPILE - Draft de Protocolos</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            color: #e0e0e0;
            font-family: 'Space Mono', monospace;
            font-size: 14px;
        }

        body {
            background: url('../images/background.png') no-repeat center center fixed;
            background-size: cover;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 14, 39, 0.75);
            z-index: 0;
        }

        /* Viewport fijo — recorta cualquier desbordamiento */
        #draft-viewport {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            z-index: 1;
        }

        /* Contenedor que escala — transform-origin arriba-centro */
        #draft-container {
            transform-origin: top center;
            width: 100%;
            max-width: 1400px;
            padding: 16px 24px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ── Cabecera ─────────────────────────────────── */
        .title-img {
            max-height: 64px;
            filter: drop-shadow(0 0 12px rgba(0, 212, 255, 0.4));
            margin-bottom: 4px;
        }

        .subtitle {
            color: #666;
            font-size: 0.8em;
            margin-bottom: 14px;
        }

        .current-turn {
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            font-size: 0.9em;
            letter-spacing: 1px;
            color: #00d4ff;
            margin-bottom: 14px;
        }

        /* ── Grid de protocolos ───────────────────────── */
        .protocols-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-auto-rows: 100px;
            gap: 10px;
            width: 100%;
            margin-bottom: 16px;
        }

        .protocol-card {
            width: 100%; height: 100%;
            border: 2px solid;
            border-radius: 8px;
            padding: 10px 12px;
            background: linear-gradient(135deg, rgba(26,31,58,0.9), rgba(10,14,39,0.95));
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            text-align: center;
            color: #e0e0e0;
            cursor: pointer;
            transition: all 0.25s;
            user-select: none;
            overflow: hidden;
        }

        .protocol-card:hover:not(.unavailable) {
            transform: translateY(-6px);
            box-shadow: 0 8px 24px rgba(0, 212, 255, 0.35);
        }

        .protocol-card.unavailable {
            opacity: 0.25;
            cursor: not-allowed;
        }

        .protocol-card.unavailable:hover {
            transform: none;
            box-shadow: none;
        }

        .protocol-card.selected-player {
            box-shadow: 0 0 16px rgba(0, 212, 255, 0.5);
        }

        .protocol-card.selected-ai {
            box-shadow: 0 0 16px rgba(255, 23, 68, 0.5);
        }

        .protocol-name {
            font-size: 1.2em;
            font-weight: bold;
            font-family: 'Orbitron', monospace;
        }

        .protocol-abilities {
            font-size: 0.78em;
            color: #999;
            line-height: 1.35;
        }

        /* ── Fila de selecciones (enfrentamiento) ─────── */
        .selections-row {
            display: flex;
            align-items: stretch;
            width: 100%;
            gap: 0;
            margin-bottom: 14px;
            background: rgba(26, 31, 58, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            overflow: hidden;
        }

        .selection-box {
            flex: 1;
            padding: 12px 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .selection-box.ai-box {
            align-items: flex-end;
            border-left: 1px solid rgba(255,255,255,0.06);
        }

        .selection-label {
            font-size: 0.75em;
            font-weight: bold;
            letter-spacing: 1px;
            opacity: 0.8;
        }

        .selection-label.player { color: #00d4ff; }
        .selection-label.ai     { color: #ff1744; }

        .selection-slots {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .ai-box .selection-slots { justify-content: flex-end; }

        .protocol-badge {
            padding: 5px 14px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.82em;
            border: 1px solid;
            font-family: 'Orbitron', monospace;
            white-space: nowrap;
        }

        .slot-empty {
            width: 80px;
            height: 30px;
            border: 1px dashed rgba(255,255,255,0.12);
            border-radius: 4px;
        }

        .vs-divider {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 20px;
            font-family: 'Orbitron', monospace;
            font-weight: 900;
            font-size: 1.3em;
            color: #333;
            border-left: 1px solid rgba(255,255,255,0.06);
            border-right: 1px solid rgba(255,255,255,0.06);
        }

        /* ── Botón inicio ─────────────────────────────── */
        .start-button {
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            color: #0a0e27;
            border: none;
            padding: 13px 32px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1em;
            font-family: 'Space Mono', monospace;
            visibility: hidden;
            transition: box-shadow 0.2s, transform 0.15s;
        }

        .start-button.ready { visibility: visible; }

        .start-button:hover {
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.6);
            transform: scale(1.04);
        }

        #btn-fullscreen {
            position: fixed;
            top: 12px; right: 16px;
            background: rgba(0,212,255,0.1);
            border: 1px solid #00d4ff;
            color: #00d4ff;
            border-radius: 8px;
            padding: 8px 14px;
            cursor: pointer;
            font-family: 'Orbitron', monospace;
            font-size: 0.75em;
            letter-spacing: 1px;
            transition: background 0.2s;
            z-index: 100;
        }
        #btn-fullscreen:hover { background: rgba(0,212,255,0.25); }
    </style>
</head>
<body>

<button id="btn-fullscreen" onclick="toggleFullscreen()" title="Pantalla completa">⛶ FULLSCREEN</button>
<div id="draft-viewport">
<div id="draft-container">

    <img src="../images/compile.png" class="title-img" alt="COMPILE">
    <p class="subtitle">Selecciona Tus Protocolos</p>
    <div class="current-turn" id="current-turn">Asignando primer jugador...</div>

    <div class="protocols-grid" id="protocols-grid"></div>

    <div class="selections-row">
        <div class="selection-box player-box">
            <div class="selection-label player">👤 TU SELECCIÓN</div>
            <div class="selection-slots" id="player-selection"></div>
        </div>
        <div class="vs-divider">VS</div>
        <div class="selection-box ai-box">
            <div class="selection-label ai">🤖 IA</div>
            <div class="selection-slots" id="ai-selection"></div>
        </div>
    </div>

    <button class="start-button" id="start-game-btn">🎮 COMENZAR JUEGO</button>

</div>
</div>

<!-- Scripts -->
<script src="cards-data.js"></script>
<script src="ai-evaluator.js"></script>
<script src="minimax.js"></script>
<script src="abilities-engine.js"></script>

<script>
'use strict';

let ALL_PROTOCOLS = [];
let PROTOCOL_DEFS = {};

let draftState = {
    available: [...ALL_PROTOCOLS],
    playerSelected: [],
    aiSelected: [],
    round: 0,
    firstPlayer: null,
    isComplete: false,
    isPlayerTurn: false,
    selectionsNeeded: 0
};

const DRAFT_ROUNDS = [
    { player: 'first',  selections: 1 },
    { player: 'second', selections: 2 },
    { player: 'first',  selections: 2 },
    { player: 'second', selections: 1 }
];

// ── Escalado responsive ────────────────────────────────────────────
function applyDraftScale() {
    const container = document.getElementById('draft-container');
    container.style.transform = 'none';
    const contentH = container.offsetHeight;
    const contentW = container.offsetWidth;
    const viewH    = window.innerHeight - 20;  // margen vertical
    const viewW    = window.innerWidth  - 40;  // margen horizontal
    const scale    = Math.min(viewH / contentH, viewW / contentW);
    if (Math.abs(scale - 1) > 0.01) {
        container.style.transform = `scale(${scale.toFixed(4)})`;
    }
}

// ── Lógica de draft ────────────────────────────────────────────────
function initDraft() {
    draftState.firstPlayer = Math.random() > 0.5 ? 'player' : 'ai';
    updateDraftDisplay();
    startRound();
}

function startRound() {
    const roundInfo = DRAFT_ROUNDS[draftState.round];
    if (!roundInfo) { completeDraft(); return; }

    const isFirstPlayer  = roundInfo.player === 'first';
    const isPlayerTurn   = (draftState.firstPlayer === 'player') === isFirstPlayer;
    const selectionsNeeded = roundInfo.selections;

    draftState.isPlayerTurn   = isPlayerTurn;
    draftState.selectionsNeeded = selectionsNeeded;

    updateDraftDisplay();

    if (!isPlayerTurn) {
        setTimeout(() => aiSelectProtocols(selectionsNeeded), 800);
    }
}

function playerSelectProtocol(protocol) {
    if (!draftState.isPlayerTurn || draftState.isComplete) return;
    if (!draftState.available.includes(protocol)) return;

    draftState.playerSelected.push(protocol);
    draftState.available.splice(draftState.available.indexOf(protocol), 1);
    draftState.selectionsNeeded--;

    updateDraftDisplay();

    if (draftState.selectionsNeeded === 0) {
        draftState.round++;
        setTimeout(() => startRound(), 500);
    }
}

// ── Tablas de evaluación estratégica del draft ─────────────────────
const PROTOCOL_STRENGTH = {
    'Espíritu': 8, 'Muerte': 8, 'Fuego': 6, 'Gravedad': 7, 'Vida': 7,
    'Luz': 6, 'Metal': 7, 'Plaga': 6, 'Psique': 7, 'Velocidad': 6,
    'Agua': 7, 'Oscuridad': 7, 'Apatía': 5, 'Odio': 7, 'Amor': 6,
    'Asimilación': 8, 'Caos': 7, 'Claridad': 6, 'Corrupción': 7, 'Valor': 7,
    'Diversidad': 6, 'Miedo': 8, 'Hielo': 7, 'Suerte': 5, 'Espejo': 7,
    'Paz': 6, 'Humo': 6, 'Tiempo': 7, 'Unidad': 8, 'Guerra': 8
};

const PROTOCOL_SYNERGY = {
    'Espíritu':    { 'Vida': 8, 'Psique': 7, 'Agua': 7, 'Amor': 6 },
    'Muerte':      { 'Odio': 9, 'Fuego': 6, 'Plaga': 5, 'Guerra': 7 },
    'Fuego':       { 'Plaga': 8, 'Odio': 7, 'Muerte': 6, 'Tiempo': 7 },
    'Gravedad':    { 'Velocidad': 8, 'Metal': 6, 'Apatía': 6, 'Humo': 7 },
    'Vida':        { 'Espíritu': 8, 'Agua': 7, 'Amor': 6, 'Luz': 6, 'Claridad': 7 },
    'Luz':         { 'Metal': 7, 'Vida': 6, 'Espíritu': 5, 'Claridad': 8 },
    'Metal':       { 'Luz': 7, 'Gravedad': 6, 'Espejo': 7 },
    'Plaga':       { 'Psique': 8, 'Fuego': 8, 'Odio': 6, 'Corrupción': 7 },
    'Psique':      { 'Plaga': 8, 'Espíritu': 7, 'Oscuridad': 7, 'Miedo': 8 },
    'Velocidad':   { 'Gravedad': 8, 'Oscuridad': 6, 'Tiempo': 7 },
    'Agua':        { 'Espíritu': 7, 'Vida': 7, 'Oscuridad': 6, 'Asimilación': 7 },
    'Oscuridad':   { 'Psique': 7, 'Velocidad': 6, 'Agua': 6, 'Apatía': 7, 'Humo': 8 },
    'Apatía':      { 'Oscuridad': 7, 'Gravedad': 6, 'Humo': 7 },
    'Odio':        { 'Muerte': 9, 'Fuego': 7, 'Plaga': 6, 'Guerra': 8 },
    'Amor':        { 'Vida': 6, 'Espíritu': 6, 'Paz': 7 },
    'Asimilación': { 'Agua': 7, 'Miedo': 7, 'Corrupción': 6 },
    'Caos':        { 'Suerte': 8, 'Humo': 7, 'Diversidad': 6 },
    'Claridad':    { 'Vida': 7, 'Luz': 8, 'Tiempo': 6 },
    'Corrupción':  { 'Plaga': 7, 'Asimilación': 6, 'Guerra': 7 },
    'Valor':       { 'Unidad': 7, 'Espejo': 6 },
    'Diversidad':  { 'Caos': 6, 'Unidad': 7 },
    'Miedo':       { 'Psique': 8, 'Asimilación': 7, 'Muerte': 7 },
    'Hielo':       { 'Metal': 6, 'Paz': 7 },
    'Suerte':      { 'Caos': 8, 'Claridad': 6 },
    'Espejo':      { 'Metal': 7, 'Valor': 6, 'Hielo': 6 },
    'Paz':         { 'Amor': 7, 'Hielo': 7 },
    'Humo':        { 'Oscuridad': 8, 'Apatía': 7, 'Gravedad': 7 },
    'Tiempo':      { 'Fuego': 7, 'Velocidad': 7, 'Claridad': 6 },
    'Unidad':      { 'Diversidad': 7, 'Valor': 7 },
    'Guerra':      { 'Muerte': 7, 'Odio': 8, 'Corrupción': 7 }
};

const PROTOCOL_COUNTER = {
    'Metal':   ['Muerte', 'Odio', 'Guerra'],
    'Vida':    ['Plaga', 'Psique', 'Corrupción'],
    'Muerte':  ['Vida', 'Gravedad', 'Unidad'],
    'Odio':    ['Espíritu', 'Luz', 'Valor'],
    'Psique':  ['Amor', 'Vida', 'Paz'],
    'Espejo':  ['Diversidad', 'Suerte'],
    'Miedo':   ['Velocidad', 'Fuego', 'Caos'],
    'Hielo':   ['Velocidad', 'Asimilación']
};

function getDraftSynergy(a, b) {
    return (PROTOCOL_SYNERGY[a] && PROTOCOL_SYNERGY[a][b]) ||
           (PROTOCOL_SYNERGY[b] && PROTOCOL_SYNERGY[b][a]) || 0;
}

function scoreProtocolForDraft(protocol, aiAlready, playerPicked) {
    let score = PROTOCOL_STRENGTH[protocol] || 5;
    aiAlready.forEach(p => { score += getDraftSynergy(protocol, p) * 1.8; });
    playerPicked.forEach(p => {
        if ((PROTOCOL_COUNTER[protocol] || []).includes(p)) score += 3;
    });
    return score;
}

function aiBestPick(available, aiAlready, playerPicked) {
    return available.slice().sort((a, b) =>
        scoreProtocolForDraft(b, aiAlready, playerPicked) -
        scoreProtocolForDraft(a, aiAlready, playerPicked)
    )[0];
}

function aiBestPair(available, aiAlready, playerPicked) {
    let bestPair = null, bestScore = -Infinity;
    for (let i = 0; i < available.length; i++) {
        for (let j = i + 1; j < available.length; j++) {
            const a = available[i], b = available[j];
            const score = scoreProtocolForDraft(a, aiAlready, playerPicked) +
                          scoreProtocolForDraft(b, [...aiAlready, a], playerPicked) +
                          getDraftSynergy(a, b) * 2;
            if (score > bestScore) { bestScore = score; bestPair = [a, b]; }
        }
    }
    return bestPair || available.slice(0, 2);
}

function aiSelectProtocols(count) {
    const picks = count === 2
        ? aiBestPair(draftState.available, draftState.aiSelected, draftState.playerSelected)
        : [aiBestPick(draftState.available, draftState.aiSelected, draftState.playerSelected)];

    picks.forEach(protocol => {
        draftState.aiSelected.push(protocol);
        draftState.available.splice(draftState.available.indexOf(protocol), 1);
    });

    draftState.round++;
    updateDraftDisplay();

    if (draftState.round < DRAFT_ROUNDS.length) {
        setTimeout(() => startRound(), 800);
    } else {
        completeDraft();
    }
}

function completeDraft() {
    draftState.isComplete = true;
    updateDraftDisplay();
    document.getElementById('start-game-btn').classList.add('ready');
}

// ── Actualización de UI ────────────────────────────────────────────
function updateDraftDisplay() {
    const roundInfo    = DRAFT_ROUNDS[draftState.round] || DRAFT_ROUNDS[DRAFT_ROUNDS.length - 1];
    const isFirstPlayer = roundInfo && roundInfo.player === 'first';
    const currentPlayer = (draftState.firstPlayer === 'player') === isFirstPlayer ? '👤 JUGADOR' : '🤖 IA';
    const roundDesc = DRAFT_ROUNDS[draftState.round]
        ? `Ronda ${draftState.round + 1}/4 — ${currentPlayer} elige ${DRAFT_ROUNDS[draftState.round].selections}`
        : 'Draft Completado';

    document.getElementById('current-turn').textContent = roundDesc;
    updateProtocolsGrid();
    updateSelections();
}

function updateProtocolsGrid() {
    const grid = document.getElementById('protocols-grid');
    grid.innerHTML = '';

    ALL_PROTOCOLS.forEach(protocol => {
        const isAvailable      = draftState.available.includes(protocol);
        const isPlayerSelected = draftState.playerSelected.includes(protocol);
        const isAiSelected     = draftState.aiSelected.includes(protocol);

        const card = document.createElement('div');
        card.className = 'protocol-card';
        if (!isAvailable)      card.classList.add('unavailable');
        if (isPlayerSelected)  card.classList.add('selected-player');
        if (isAiSelected)      card.classList.add('selected-ai');

        const color = PROTOCOL_DEFS[protocol].color;
        card.style.borderColor = color;
        card.innerHTML = `
            <div class="protocol-name" style="color:${color}">${protocol}</div>
            <div class="protocol-abilities">${PROTOCOL_DEFS[protocol].abilities}</div>
        `;

        if (isAvailable && draftState.isPlayerTurn && !draftState.isComplete) {
            card.onclick = () => playerSelectProtocol(protocol);
        } else {
            card.style.cursor = 'default';
        }

        grid.appendChild(card);
    });
}

function updateSelections() {
    const playerBox = document.getElementById('player-selection');
    const aiBox     = document.getElementById('ai-selection');

    const renderSlots = (selected, isAi) => {
        const slots = [];
        for (let i = 0; i < 3; i++) {
            if (selected[i]) {
                const p     = selected[i];
                const color = (PROTOCOL_DEFS[p] && PROTOCOL_DEFS[p].color) || (isAi ? '#ff1744' : '#00d4ff');
                slots.push(`<div class="protocol-badge" style="color:${color};border-color:${color};background:${color}18">${p}</div>`);
            } else {
                slots.push(`<div class="slot-empty"></div>`);
            }
        }
        return slots.join('');
    };

    playerBox.innerHTML = renderSlots(draftState.playerSelected, false);
    aiBox.innerHTML     = renderSlots(draftState.aiSelected, true);
}

// ── Inicialización ─────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
    const selectedProtocols = sessionStorage.getItem('selectedProtocols');

    try {
        const meta = CARDS_DATA._protocolMeta || {};
        ALL_PROTOCOLS = Object.keys(meta).filter(key => {
            const proto = meta[key];
            if (selectedProtocols === '1') return proto.edicion === 1;
            if (selectedProtocols === '2') return proto.edicion === 2;
            return true;
        });
        PROTOCOL_DEFS = meta;
        draftState.available = [...ALL_PROTOCOLS];
        initDraft();
        // Escalar tras el primer render
        requestAnimationFrame(() => requestAnimationFrame(applyDraftScale));
    } catch(e) {
        console.error('❌ Error iniciando draft:', e);
        document.getElementById('current-turn').textContent = '❌ Error: ' + e.message;
    }
});

window.addEventListener('resize', applyDraftScale);

function toggleFullscreen() {
    const btn = document.getElementById('btn-fullscreen');
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(() => {});
        btn.textContent = '✕ SALIR';
    } else {
        document.exitFullscreen().catch(() => {});
        btn.textContent = '⛶ FULLSCREEN';
    }
}

document.addEventListener('fullscreenchange', () => {
    const btn = document.getElementById('btn-fullscreen');
    if (!document.fullscreenElement) btn.textContent = '⛶ FULLSCREEN';
    setTimeout(applyDraftScale, 50);
});

document.getElementById('start-game-btn').addEventListener('click', function() {
    if (draftState.isComplete) {
        sessionStorage.setItem('playerProtocols', JSON.stringify(draftState.playerSelected));
        sessionStorage.setItem('aiProtocols',     JSON.stringify(draftState.aiSelected));
        window.location.href = 'game.html';
    }
});
</script>

</body>
</html>
