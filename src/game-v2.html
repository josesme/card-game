<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMPILE - Mesa de Juego (v2)</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Orbitron:wght@400;700;900&family=Space+Mono:wght@400;700&family=Teko:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="design-tokens.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="ui-components.css">
    <style>
        body {
            padding: 0;
            margin: 0;
            overflow: hidden;
            background: #0b0f1a !important;
            color: #e0e0e0;
            font-family: 'JetBrains Mono', monospace;
            height: 100vh;
        }
        body::before {
            display: none !important;
        }

        #game-container {
            position: relative;
            z-index: 1;
            padding: 8px 20px 0;
            max-width: 1500px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            height: calc(100vh - 42px); /* reserve space for hand-bar */
            overflow: hidden;
        }

        #btn-fullscreen {
            position: absolute;
            right: 0;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #030712;
            border: 1.5px solid #00f5ff;
            border-radius: 8px;
            cursor: pointer;
            padding: 0;
            box-shadow: 0 0 12px rgba(0,245,255,0.33), 0 0 3px rgba(0,245,255,0.55);
            transition: box-shadow 0.25s, background 0.25s;
        }
        #btn-fullscreen svg {
            width: 22px;
            height: 22px;
            stroke: #00f5ff;
            stroke-width: 2;
            fill: none;
            filter: drop-shadow(0 0 8px rgba(0,245,255,0.66));
        }
        #btn-fullscreen:hover {
            background: #061220;
            box-shadow: 0 0 18px rgba(0,245,255,0.5), 0 0 6px rgba(0,245,255,0.7);
        }

        :fullscreen body, :-webkit-full-screen body {
            overflow: hidden;
        }

        .hidden {
            display: none !important;
        }

        /* status-bar hidden in v2, kept for id compat */

        /* ── HAND OVERLAY (bar always visible, content slides up) ── */
        #hand-overlay {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            z-index: 950;
            display: flex;
            flex-direction: column;
        }

        #hand-overlay .hand-bar {
            background: rgba(10,14,39,0.97);
            border-top: 2px solid var(--player-primary);
            flex-shrink: 0;
            cursor: pointer;
            padding: 8px 20px;
        }
        #hand-overlay .hand-bar-inner {
            display: flex;
            align-items: center;
            gap: 12px;
            max-width: 1500px;
            margin: 0 auto;
        }

        #hand-overlay .hand-bar .hand-title {
            color: var(--player-primary);
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #hand-overlay .hand-bar .stat-group {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.82em;
            flex-shrink: 0;
        }
        #hand-overlay .hand-bar .stat-label {
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 0.85em;
        }
        #hand-overlay .hand-bar .stat-value {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 1.1em;
            min-width: 1.2em;
            text-align: center;
        }

        #hand-overlay .hand-content {
            max-height: 0;
            overflow: hidden;
            background: rgba(10,14,39,0.97);
            transition: max-height 0.3s ease;
            padding: 0 20px;
        }
        #hand-overlay.open .hand-content {
            max-height: 70vh;
            overflow-x: auto;
            overflow-y: visible;
            padding: 12px 20px;
        }

        /* ── LOG TOGGLE ─────────────────────────────── */
        #log-toggle {
            position: fixed;
            bottom: 52px;
            right: 12px;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #030712;
            border: 1.5px solid #8b5cf6;
            border-radius: 8px;
            cursor: pointer;
            padding: 0;
            z-index: 900;
            box-shadow: 0 0 12px rgba(139,92,246,0.33), 0 0 3px rgba(139,92,246,0.55);
            transition: box-shadow 0.25s, background 0.25s;
            transition: background 0.2s;
        }
        #log-toggle svg {
            width: 22px;
            height: 22px;
            stroke: #8b5cf6;
            stroke-width: 2;
            fill: none;
            filter: drop-shadow(0 0 8px rgba(139,92,246,0.66));
        }
        #log-toggle:hover {
            background: #0e0820;
            box-shadow: 0 0 18px rgba(139,92,246,0.5), 0 0 6px rgba(139,92,246,0.7);
        }

        #log-overlay {
            position: fixed;
            top: 0; right: 0;
            width: 340px;
            height: 100%;
            background: rgba(10,14,39,0.97);
            border-left: 2px solid var(--player-primary);
            z-index: 901;
            display: flex;
            flex-direction: column;
            transform: translateX(100%);
            transition: transform 0.25s ease;
        }
        #log-overlay.open { transform: translateX(0); }

        #log-overlay .log-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            border-bottom: 1px solid #333;
        }
        #log-overlay .log-header span {
            color: var(--player-primary);
            font-size: 1em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        #log-overlay .log-close {
            background: none;
            border: none;
            color: #888;
            font-size: 1.4em;
            cursor: pointer;
        }
        #log-overlay .log-close:hover { color: #fff; }

        /* ── BATTLE FIELD (3 vertical columns) ──────── */
        .battle-field {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex: 1;
            min-height: 0;
        }

        .battle-column {
            display: flex;
            flex-direction: column;
            background: rgba(15, 20, 45, 0.5);
            border: 1px solid rgba(255, 217, 61, 0.15);
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            padding: 8px;
            gap: 4px;
            flex: 1;
            min-width: 0;
            min-height: 0;
            overflow: hidden;
        }

        /* Force content below watermark icons */
        .proto-row, .line-container {
            position: relative;
            z-index: 0;
        }

        /* Proto row: both protocols side by side */
        .proto-row {
            display: flex;
            gap: 6px;
            justify-content: center;
        }
        .proto-box {
            border-radius: 6px;
            padding: 4px 8px;
            text-align: center;
            flex: 1;
            min-width: 0;
            position: relative;
            overflow: hidden;
        }
        .proto-box.player {
            border: 2px solid var(--player-primary);
            background: linear-gradient(135deg, rgba(26,31,58,0.85), rgba(30,41,59,0.7));
            box-shadow: 0 0 10px var(--player-primary)22;
        }
        .proto-box.player .proto-card-name {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 9px;
            color: var(--player-primary);
        }
        .proto-box.ai {
            border: 2px solid var(--ai-primary);
            background: linear-gradient(135deg, rgba(26,31,58,0.85), rgba(30,41,59,0.7));
            box-shadow: 0 0 10px var(--ai-primary)22;
        }
        .proto-box.ai .proto-card-name {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 9px;
            color: var(--ai-primary);
        }
        .proto-box .proto-card-status {
            font-size: 0.55em;
            color: #aaa;
            line-height: 1.2;
        }

        /* Proto box con imagen de cabecera de carta */
        .proto-box.proto-img {
            background-size: cover;
            background-position: top center;
            padding: 0;
            height: 36px;
            border: none;
            box-shadow: none;
        }
        .proto-box.proto-img .proto-card-name {
            display: none;
        }
        .proto-box.proto-img .proto-card-status {
            display: none;
        }
        .proto-box.proto-img .proto-score {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Teko', sans-serif;
            font-size: 2.6em;
            font-weight: 700;
            color: #F5F5F5;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
            z-index: 1;
            background: #3a3f4a;
            padding: 6px 13px 0px;
            margin-bottom: -2px;
            border-radius: 4px;
            line-height: 1.1;
        }

        /* Line container: player | separator | AI side by side */
        .line-container {
            display: flex;
            flex-direction: row;
            align-items: stretch;
            flex: 1;
            gap: 0;
            min-height: 0;
            overflow-y: auto;
            overflow-x: hidden;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,217,61,0.2) transparent;
        }

        /* Vertical stacks */
        .vertical-stack {
            position: relative;
            flex: 1;
            min-width: 0;
            min-height: 0;
        }

        /* Fondo de color por jugador */
        .player-stack.vertical-stack {
            background: linear-gradient(180deg, rgba(245,189,31,0.06) 0%, rgba(245,189,31,0.16) 100%);
            border-radius: 6px;
        }
        .ai-stack.vertical-stack {
            background: linear-gradient(180deg, rgba(71,41,123,0.08) 0%, rgba(71,41,123,0.22) 100%);
            border-radius: 6px;
        }

        /* Watermark icons — on battle-column (fixed height) instead of stacks (scrollable) */
        .battle-column {
            position: relative;
        }
        .battle-column::before {
            content: '';
            position: absolute;
            top: 45%;
            left: 25%;
            transform: translateX(-50%);
            width: 32%;
            height: 14.4%;
            background: url('../images/Background/Human.png') center / contain no-repeat;
            opacity: 0.12;
            pointer-events: none;
            z-index: 10;
        }
        .battle-column::after {
            content: '';
            position: absolute;
            top: 45%;
            right: 25%;
            transform: translateX(50%);
            width: 32%;
            height: 14.4%;
            background: url('../images/Background/IA.png') center / contain no-repeat;
            opacity: 0.12;
            pointer-events: none;
            z-index: 10;
        }

        /* Cards inside stacks: absolute positioned for overlap */
        .vertical-stack .card-field-wrapper {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 209px;
        }

        /* Vertical separator between player and AI */
        .line-separator-h {
            width: 2px;
            min-height: 0;
            align-self: stretch;
            background: linear-gradient(to bottom, transparent, #555, transparent);
            flex-shrink: 0;
            margin: 0 2px;
        }

        /* ── Field cards (full size like hand) ──────── */
        .vertical-stack .card {
            width: 209px;
            height: 277px;
            font-size: 1em;
        }
        /* ── Hand cards larger in v2 ───────────── */
        #hand-overlay #player-hand .card {
            width: 215px;
            height: 300px;
            font-size: 1.16em;
        }

        /* ── Card with image background (v2) ────── */
        .card.card-img {
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
            padding: 0;
            overflow: hidden;
            border: none !important;
            box-shadow: none !important;
        }

        .card.card-img.face-down {
            border-color: #444 !important;
            box-shadow: none !important;
        }

        /* Zonas de texto — posición absoluta fija por slot (Inicio/Acción/Final) */
        .card-img-zone {
            position: absolute;
            left: 5%;
            right: 5%;
            display: flex;
            align-items: center;
            padding: 6px 6px 4px;
            background: rgba(20,24,32,0.92);
            border: 1px solid #676E79;
            border-left: 2px solid rgba(255,255,255,0.15);
            border-radius: 3px;
            box-sizing: border-box;
            overflow: hidden;
        }
        .card-img-zone.slot-start  { top: calc(24% - 6px); height: calc(24% + 1px); }
        .card-img-zone.slot-action { top: calc(50% - 8px); height: calc(24% + 1px); }
        .card-img-zone.slot-end    { top: calc(74% - 2px); height: calc(24% + 1px); }

        .card-img-zone-text {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.55em;
            line-height: 1.25;
            color: #e0e6ee;
        }


        /* Compiled proto-box indicator — intense pulsing glow */
        @keyframes pulse-player {
            0%, 100% { box-shadow: 0 0 10px rgba(255,217,61,0.5), 0 0 30px rgba(255,217,61,0.3), 0 0 60px rgba(255,217,61,0.15), inset 0 0 15px rgba(255,217,61,0.2); border-color: var(--player-primary); }
            50% { box-shadow: 0 0 20px rgba(255,217,61,0.9), 0 0 50px rgba(255,217,61,0.5), 0 0 80px rgba(255,217,61,0.25), inset 0 0 30px rgba(255,217,61,0.4); border-color: var(--player-100); }
        }
        @keyframes pulse-ai {
            0%, 100% { box-shadow: 0 0 12px rgba(155,77,202,0.6), 0 0 35px rgba(155,77,202,0.4), 0 0 65px rgba(155,77,202,0.2), inset 0 0 20px rgba(155,77,202,0.3); border-color: #9B4DCA; }
            50% { box-shadow: 0 0 25px rgba(155,77,202,1), 0 0 55px rgba(155,77,202,0.6), 0 0 90px rgba(155,77,202,0.3), inset 0 0 35px rgba(155,77,202,0.5); border-color: #B76EE0; }
        }
        @keyframes shimmer-compiled {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .proto-box.compiled-player {
            border: 3px solid var(--player-primary) !important;
            animation: pulse-player 1.5s ease-in-out infinite;
            position: relative;
            overflow: hidden;
        }
        .proto-box.compiled-player::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(120deg, transparent 30%, rgba(255,217,61,0.25) 50%, transparent 70%);
            background-size: 200% 100%;
            animation: shimmer-compiled 8s linear infinite;
            pointer-events: none;
        }
        .proto-box.compiled-ai {
            border: 3px solid #9B4DCA !important;
            animation: pulse-ai 1.5s ease-in-out infinite;
            position: relative;
            overflow: hidden;
        }
        .proto-box.compiled-ai::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(120deg, transparent 30%, rgba(155,77,202,0.35) 50%, transparent 70%);
            background-size: 200% 100%;
            animation: shimmer-compiled 8s linear infinite;
            pointer-events: none;
        }

        /* ── NAV BUTTONS ────────────────────────────── */
        /* nav-btn ahora hereda de .ui-btn en style.css */
    </style>
</head>
<body>

<div id="game-container">
    <!-- HEADER -->
    <header style="text-align: center; margin-bottom: 10px; position: relative; display: flex; align-items: center; justify-content: center;">
        <div style="position: absolute; left: 0; display: flex; gap: 8px;">
            <button class="ui-btn ui-btn--sm" onclick="window.location.href='/src/draft.html'">NUEVO DRAFT</button>
            <button class="ui-btn ui-btn--sm ui-btn--danger" onclick="window.location.href='/src/index.html'">ABANDONAR</button>
        </div>
        <img src="../images/Background/Compile.png" alt="COMPILE" style="height: auto; max-height: 50px; filter: drop-shadow(0 0 12px rgba(255,217,61,0.4));">
        <button id="btn-fullscreen" onclick="toggleFullscreen()" title="Pantalla completa">
            <svg id="fs-icon-expand" viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></svg>
            <svg id="fs-icon-shrink" viewBox="0 0 24 24" style="display:none"><path d="M4 14h6v6"/><path d="M20 10h-6V4"/><path d="M14 10l7-7"/><path d="M3 21l7-7"/></svg>
        </button>
    </header>

    <!-- ═══ GAME BOARD (3 vertical columns) ═══ -->
    <div class="battle-field">

        <!-- Column: IZQUIERDA -->
        <div class="battle-column">

            <div class="proto-row">
                <div id="proto-izquierda-player" class="proto-box player">
                    <div class="proto-card-name">—</div>
                    <div class="proto-card-status"></div>
                    <div class="proto-score player-score">0</div>
                </div>
                <div id="proto-izquierda-ai" class="proto-box ai">
                    <div class="proto-card-name">—</div>
                    <div class="proto-card-status"></div>
                    <div class="proto-score ai-score">0</div>
                </div>
            </div>
            <div id="line-izquierda" class="line-container">
                <div class="player-stack vertical-stack"></div>
                <div class="line-separator-h"></div>
                <div class="ai-stack vertical-stack"></div>
            </div>
        </div>

        <!-- Column: CENTRO -->
        <div class="battle-column">

            <div class="proto-row">
                <div id="proto-centro-player" class="proto-box player">
                    <div class="proto-card-name">—</div>
                    <div class="proto-card-status"></div>
                    <div class="proto-score player-score">0</div>
                </div>
                <div id="proto-centro-ai" class="proto-box ai">
                    <div class="proto-card-name">—</div>
                    <div class="proto-card-status"></div>
                    <div class="proto-score ai-score">0</div>
                </div>
            </div>
            <div id="line-centro" class="line-container">
                <div class="player-stack vertical-stack"></div>
                <div class="line-separator-h"></div>
                <div class="ai-stack vertical-stack"></div>
            </div>
        </div>

        <!-- Column: DERECHA -->
        <div class="battle-column">

            <div class="proto-row">
                <div id="proto-derecha-player" class="proto-box player">
                    <div class="proto-card-name">—</div>
                    <div class="proto-card-status"></div>
                    <div class="proto-score player-score">0</div>
                </div>
                <div id="proto-derecha-ai" class="proto-box ai">
                    <div class="proto-card-name">—</div>
                    <div class="proto-card-status"></div>
                    <div class="proto-score ai-score">0</div>
                </div>
            </div>
            <div id="line-derecha" class="line-container">
                <div class="player-stack vertical-stack"></div>
                <div class="line-separator-h"></div>
                <div class="ai-stack vertical-stack"></div>
            </div>
        </div>

    </div>

    <!-- Hidden AI hand container (logic.js needs it) -->
    <div id="ai-hand" style="display: none;"></div>
    <!-- Hidden player-hand-col wrapper for ResizeObserver compat -->
    <div id="player-hand-col" style="display: none;"></div>
    <!-- Hidden hand-section wrapper for logic.js compat -->
    <div id="hand-section" style="display: none;"></div>
</div>

<!-- ═══ HAND OVERLAY (slide-up) ═══ -->
<div id="hand-overlay">
    <div class="hand-bar">
      <div class="hand-bar-inner">
        <div style="display: flex; align-items: center; gap: 8px; width: 220px; flex-shrink: 0;">
            <span style="color: var(--player-primary); font-size: 0.85em; font-weight: bold;">JUG</span>
            <span class="stat-label">Mazo</span>
            <span id="player-deck-count" class="stat-value" style="color: var(--player-primary);">0</span>
            <span class="stat-label">Desc.</span>
            <span id="player-trash-count" class="stat-value" style="color: var(--player-300);">0</span>
            <button id="player-deck-btn" title="Recargar Mazo" class="ui-btn ui-btn--sm">ACTUALIZAR</button>
        </div>
        <div id="discard-banner"></div>
        <button id="btn-stop-discard" class="hidden ui-btn ui-btn--sm ui-btn--danger">DETENER DESCARTE</button>
        <div id="game-status" style="flex: 1; text-align: center; color: var(--ui-cyan); font-family: 'JetBrains Mono', monospace; font-weight: 600; font-size: 10px; letter-spacing: 1px;">—</div>
        <div style="display: flex; align-items: center; gap: 8px; width: 220px; flex-shrink: 0; justify-content: flex-end;">
            <span style="color: var(--ai-primary); font-size: 0.85em; font-weight: bold;">IA</span>
            <span class="stat-label">Mano</span>
            <span id="ai-hand-count" class="stat-value" style="color: var(--ai-100);">0</span>
            <span class="stat-label">Mazo</span>
            <span id="ai-deck-count" class="stat-value" style="color: var(--ai-100);">0</span>
            <span class="stat-label">Desc.</span>
            <span id="ai-trash-count" class="stat-value" style="color: var(--ai-300);">0</span>
        </div>
        <span id="hand-count-badge" style="display:none;"></span>
      </div>
    </div>
    <div id="command-confirm" class="hidden" style="background: var(--ui-bg); border: 1px solid rgba(0,245,255,0.3); padding: 12px 16px; margin: 10px 20px; text-align: center;">
        <div id="confirm-msg" style="color: var(--ui-cyan); margin-bottom: 10px; font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 600; letter-spacing: 1px;"></div>
        <button id="btn-confirm-yes" class="ui-btn ui-btn--sm" style="margin-right:8px;">SI</button>
        <button id="btn-confirm-no" class="ui-btn ui-btn--sm ui-btn--danger">NO</button>
    </div>
    <div class="hand-content">
        <div id="player-hand" style="display: flex; flex-wrap: nowrap; gap: 10px; min-height: 245px; overflow-x: auto; overflow-y: visible; align-items: center; justify-content: center; scrollbar-width: thin; scrollbar-color: #00d4ff44 transparent; padding-bottom: 8px;">
        </div>
    </div>
</div>

<!-- CARD PREVIEW PANEL (centro fijo) -->
<div id="card-preview-panel" class="hidden"></div>

<!-- MODALS (Hidden, controlled by logic.js) -->

<!-- ACTION MODAL: Card selection -->
<div id="action-modal" class="hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); z-index: 1000; display: flex; align-items: center; justify-content: center;">
    <div style="background: var(--ui-bg); border: 1px solid rgba(0,245,255,0.3); padding: 30px; max-width: 400px; width: 90%;">
        <h2 style="color: var(--ui-cyan); margin-bottom: 20px; text-align: center; font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase;">Selecciona Accion</h2>

<script>
    // Mirror last log entry into the status bar
    (function() {
        const log = document.getElementById('game-log');
        const bar = document.getElementById('game-status');
        if (!log || !bar) return;
        new MutationObserver(() => {
            const last = log.querySelector('.log-latest');
            if (last) {
                const txt = last.textContent.trim().replace(/^[•➔⚡🎴💀🔄🗑️💧☣️]\s*/, '');
                bar.textContent = txt;
                bar.style.color = last.style.color || '#FFD93D';
            }
        }).observe(log, { childList: true });
    })();
</script>
<script>
    const DESIGN_WIDTH = 1500;
    const DESIGN_HEIGHT = 920;

    function updateGameZoom() {
        const vw = window.innerWidth;
        const vh = window.innerHeight;
        const scale = Math.min(vw / DESIGN_WIDTH, vh / DESIGN_HEIGHT);
        document.documentElement.style.zoom = scale.toFixed(4);
    }

    function setFsIcons(isFs) {
        document.getElementById('fs-icon-expand').style.display = isFs ? 'none' : '';
        document.getElementById('fs-icon-shrink').style.display = isFs ? '' : 'none';
    }

    function toggleFullscreen() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(() => {});
            setFsIcons(true);
            sessionStorage.setItem('fs', '1');
        } else {
            document.exitFullscreen().catch(() => {});
            setFsIcons(false);
            sessionStorage.removeItem('fs');
        }
    }

    document.addEventListener('fullscreenchange', () => {
        if (document.fullscreenElement) {
            setFsIcons(true);
        } else {
            setFsIcons(false);
            sessionStorage.removeItem('fs');
        }
        setTimeout(updateGameZoom, 50);
    });

    window.addEventListener('resize', updateGameZoom);
    document.addEventListener('DOMContentLoaded', updateGameZoom);
    window.addEventListener('load', updateGameZoom);
    if (sessionStorage.getItem('fs') === '1') {
        document.documentElement.requestFullscreen().catch(() => {
            document.addEventListener('click', function restoreFs() {
                if (sessionStorage.getItem('fs') === '1' && !document.fullscreenElement)
                    document.documentElement.requestFullscreen().catch(() => sessionStorage.removeItem('fs'));
                document.removeEventListener('click', restoreFs);
            });
        });
    }

    // Hand overlay: hover to open/close
    (function() {
        const overlay = document.getElementById('hand-overlay');
        if (!overlay) return;
        const bar = overlay.querySelector('.hand-bar');

        function hasActiveModal() {
            const ids = ['action-modal', 'command-confirm-modal', 'reveal-modal'];
            return ids.some(id => {
                const el = document.getElementById(id);
                return el && !el.classList.contains('hidden') && el.style.display !== 'none';
            });
        }

        // Hover on bar opens
        bar.addEventListener('mouseenter', () => overlay.classList.add('open'));

        // Leaving the entire overlay closes (with small delay to avoid flicker)
        // BUT not if there's an active modal requiring player action
        let closeTimer;
        overlay.addEventListener('mouseleave', () => {
            closeTimer = setTimeout(() => {
                if (!hasActiveModal()) overlay.classList.remove('open');
            }, 200);
        });
        overlay.addEventListener('mouseenter', () => clearTimeout(closeTimer));
    })();

    // Auto-open hand when action modals appear
    (function() {
        const overlay = document.getElementById('hand-overlay');
        if (!overlay) return;
        ['action-modal', 'command-confirm-modal', 'reveal-modal'].forEach(id => {
            const modal = document.getElementById(id);
            if (!modal) return;
            new MutationObserver(() => {
                const visible = !modal.classList.contains('hidden') && modal.style.display !== 'none';
                if (visible) overlay.classList.add('open');
            }).observe(modal, { attributes: true, attributeFilter: ['class', 'style'] });
        });
    })();

    // Close log when clicking outside
    document.addEventListener('click', function(e) {
        const logOverlay = document.getElementById('log-overlay');
        const logToggle = document.getElementById('log-toggle');
        if (logOverlay && logOverlay.classList.contains('open')) {
            if (!logOverlay.contains(e.target) && !logToggle.contains(e.target)) {
                logOverlay.classList.remove('open');
            }
        }
    });
</script>
