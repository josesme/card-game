<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMPILE - Mesa de Juego (v2)</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            padding: 0;
            overflow: auto;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: #e0e0e0;
            font-family: 'Space Mono', monospace;
        }

        #game-container {
            padding: 12px 20px;
            max-width: 1500px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
        }

        #btn-fullscreen:hover {
            background: rgba(0,212,255,0.25) !important;
        }

        :fullscreen body, :-webkit-full-screen body {
            overflow: hidden;
        }

        .hidden {
            display: none !important;
        }

        /* ── STATUS BAR (slim, just game status msg) ── */
        #status-bar {
            background: rgba(0,0,0,0.5);
            border: 1px solid #333;
            border-radius: 8px;
            padding: 6px 16px;
            margin-bottom: 8px;
            text-align: center;
            min-height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #status-bar .status-msg {
            font-size: 0.95em;
            color: #facc15;
            font-weight: bold;
        }

        /* ── HAND OVERLAY (slide-up from bottom) ───── */
        #hand-overlay {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            max-height: 75vh;
            background: rgba(10,14,39,0.97);
            border-top: 2px solid #00d4ff;
            z-index: 950;
            display: flex;
            flex-direction: column;
            transform: translateY(100%);
            transition: transform 0.25s ease;
            box-shadow: 0 -8px 40px rgba(0,0,0,0.6);
        }
        #hand-overlay.open { transform: translateY(0); }

        #hand-overlay .hand-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            border-bottom: 1px solid #333;
            flex-shrink: 0;
        }

        #hand-overlay .hand-bar .hand-title {
            color: #00d4ff;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #hand-overlay .hand-bar .stat-group {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.82em;
        }
        #hand-overlay .hand-bar .stat-label {
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        #hand-overlay .hand-bar .stat-value {
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            font-size: 1.1em;
            min-width: 1.5em;
            text-align: center;
        }
        #hand-overlay .hand-bar .stat-divider {
            width: 1px;
            height: 1.4em;
            background: #444;
            flex-shrink: 0;
        }
        .hand-close {
            background: none;
            border: none;
            color: #888;
            font-size: 1.4em;
            cursor: pointer;
        }
        .hand-close:hover { color: #fff; }

        #hand-overlay .hand-content {
            padding: 12px 20px;
            overflow-x: auto;
            overflow-y: visible;
            flex: 1;
        }

        /* ── HAND TOGGLE BUTTON ────────────────────── */
        #hand-toggle {
            position: fixed;
            bottom: 12px;
            left: 12px;
            z-index: 900;
            background: rgba(0,212,255,0.15);
            border: 1px solid #00d4ff;
            color: #00d4ff;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            cursor: pointer;
            font-size: 1.4em;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        #hand-toggle:hover { background: rgba(0,212,255,0.3); }
        /* Badge for card count */
        #hand-toggle .badge {
            position: absolute;
            top: -4px; right: -4px;
            background: #00d4ff;
            color: #0a0e27;
            font-family: 'Orbitron', monospace;
            font-size: 0.5em;
            font-weight: 900;
            width: 20px; height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ── LOG TOGGLE ─────────────────────────────── */
        #log-toggle {
            position: fixed;
            bottom: 12px;
            right: 12px;
            z-index: 900;
            background: rgba(0,212,255,0.15);
            border: 1px solid #00d4ff;
            color: #00d4ff;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            cursor: pointer;
            font-size: 1.3em;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        #log-toggle:hover { background: rgba(0,212,255,0.3); }

        #log-overlay {
            position: fixed;
            top: 0; right: 0;
            width: 340px;
            height: 100%;
            background: rgba(10,14,39,0.97);
            border-left: 2px solid #00d4ff;
            z-index: 901;
            display: flex;
            flex-direction: column;
            transform: translateX(100%);
            transition: transform 0.25s ease;
        }
        #log-overlay.open { transform: translateX(0); }

        #log-overlay .log-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            border-bottom: 1px solid #333;
        }
        #log-overlay .log-header span {
            color: #00d4ff;
            font-size: 1em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        #log-overlay .log-close {
            background: none;
            border: none;
            color: #888;
            font-size: 1.4em;
            cursor: pointer;
        }
        #log-overlay .log-close:hover { color: #fff; }

        /* ── BATTLE FIELD (3 vertical columns) ──────── */
        .battle-field {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            justify-content: center;
        }

        .battle-column {
            display: flex;
            flex-direction: column;
            background: rgba(0,0,0,0.3);
            border: 1px solid #333;
            border-radius: 10px;
            padding: 8px;
            gap: 4px;
            flex: 1;
            min-width: 0;
        }

        .column-label {
            text-align: center;
            font-family: 'Orbitron', monospace;
            font-size: 0.65em;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Proto row: both protocols side by side */
        .proto-row {
            display: flex;
            gap: 6px;
            justify-content: center;
        }
        .proto-box {
            border-radius: 6px;
            padding: 4px 8px;
            text-align: center;
            flex: 1;
            min-width: 0;
        }
        .proto-box.player {
            border: 2px solid #00d4ff;
            background: linear-gradient(135deg, rgba(26,31,58,0.85), rgba(30,41,59,0.7));
            box-shadow: 0 0 10px #00d4ff22;
        }
        .proto-box.player .proto-card-name {
            font-family: 'Orbitron', monospace;
            font-weight: bold;
            font-size: 0.7em;
            color: #00d4ff;
        }
        .proto-box.ai {
            border: 2px solid #ef4444;
            background: linear-gradient(135deg, rgba(26,31,58,0.85), rgba(30,41,59,0.7));
            box-shadow: 0 0 10px #ef444422;
        }
        .proto-box.ai .proto-card-name {
            font-family: 'Orbitron', monospace;
            font-weight: bold;
            font-size: 0.7em;
            color: #ef4444;
        }
        .proto-box .proto-card-status {
            font-size: 0.55em;
            color: #aaa;
            line-height: 1.2;
        }

        /* Line container: player | separator | AI side by side */
        .line-container {
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            flex: 1;
            gap: 0;
        }

        /* Vertical stacks */
        .vertical-stack {
            position: relative;
            flex: 1;
            min-width: 0;
            min-height: 260px;
        }

        /* Cards inside stacks: absolute positioned for overlap */
        .vertical-stack .card-field-wrapper {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 185px;
        }

        /* Vertical separator between player and AI */
        .line-separator-h {
            width: 2px;
            min-height: 260px;
            align-self: stretch;
            background: linear-gradient(to bottom, transparent, #555, transparent);
            flex-shrink: 0;
            margin: 0 2px;
        }

        /* ── Field cards (full size like hand) ──────── */
        .vertical-stack .card {
            width: 185px;
            height: 245px;
            font-size: 1em;
        }
        /* Compiled line indicator */
        .battle-column.compiled-player { border-color: #00d4ff; box-shadow: 0 0 12px #00d4ff44; }
        .battle-column.compiled-ai { border-color: #ef4444; box-shadow: 0 0 12px #ef444444; }

        /* ── NAV BUTTONS ────────────────────────────── */
        .nav-btn {
            background: rgba(0,212,255,0.1);
            border: 1px solid #00d4ff;
            color: #00d4ff;
            border-radius: 8px;
            padding: 8px 14px;
            cursor: pointer;
            font-family: 'Orbitron', monospace;
            font-size: 0.75em;
            letter-spacing: 1px;
            transition: background 0.2s;
        }
        .nav-btn:hover { background: rgba(0,212,255,0.25); }
    </style>
</head>
<body>

<div id="game-container">
    <!-- HEADER -->
    <header style="text-align: center; margin-bottom: 10px; position: relative; display: flex; align-items: center; justify-content: center;">
        <div style="position: absolute; left: 0; display: flex; gap: 8px;">
            <button class="nav-btn" onclick="window.location.href='/src/draft.html'">NUEVO DRAFT</button>
            <button class="nav-btn" onclick="window.location.href='/src/index.html'">SALIR</button>
        </div>
        <img src="../images/compile.png" alt="COMPILE" style="height: auto; max-height: 50px; filter: drop-shadow(0 0 12px rgba(0, 212, 255, 0.4));">
        <button id="btn-fullscreen" onclick="toggleFullscreen()" title="Pantalla completa" style="position: absolute; right: 0; background: rgba(0,212,255,0.1); border: 1px solid #00d4ff; color: #00d4ff; border-radius: 8px; padding: 8px 14px; cursor: pointer; font-family: 'Orbitron', monospace; font-size: 0.75em; letter-spacing: 1px; transition: background 0.2s;">
            ⛶ FULLSCREEN
        </button>
    </header>

    <!-- ═══ STATUS BAR (game messages only) ═══ -->
    <div id="status-bar">
        <div class="status-msg" id="game-status">—</div>
    </div>

    <!-- ═══ GAME BOARD (3 vertical columns) ═══ -->
    <div class="battle-field">

        <!-- Column: IZQUIERDA -->
        <div class="battle-column">
            <div class="column-label">Izquierda</div>
            <div class="proto-row">
                <div id="proto-izquierda-player" class="proto-box player">
                    <div class="proto-card-name">—</div>
                    <div class="proto-card-status"></div>
                    <div class="proto-score player-score">0</div>
                </div>
                <div id="proto-izquierda-ai" class="proto-box ai">
                    <div class="proto-card-name">—</div>
                    <div class="proto-card-status"></div>
                    <div class="proto-score ai-score">0</div>
                </div>
            </div>
            <div id="line-izquierda" class="line-container">
                <div class="player-stack vertical-stack"></div>
                <div class="line-separator-h"></div>
                <div class="ai-stack vertical-stack"></div>
            </div>
        </div>

        <!-- Column: CENTRO -->
        <div class="battle-column">
            <div class="column-label">Centro</div>
            <div class="proto-row">
                <div id="proto-centro-player" class="proto-box player">
                    <div class="proto-card-name">—</div>
                    <div class="proto-card-status"></div>
                    <div class="proto-score player-score">0</div>
                </div>
                <div id="proto-centro-ai" class="proto-box ai">
                    <div class="proto-card-name">—</div>
                    <div class="proto-card-status"></div>
                    <div class="proto-score ai-score">0</div>
                </div>
            </div>
            <div id="line-centro" class="line-container">
                <div class="player-stack vertical-stack"></div>
                <div class="line-separator-h"></div>
                <div class="ai-stack vertical-stack"></div>
            </div>
        </div>

        <!-- Column: DERECHA -->
        <div class="battle-column">
            <div class="column-label">Derecha</div>
            <div class="proto-row">
                <div id="proto-derecha-player" class="proto-box player">
                    <div class="proto-card-name">—</div>
                    <div class="proto-card-status"></div>
                    <div class="proto-score player-score">0</div>
                </div>
                <div id="proto-derecha-ai" class="proto-box ai">
                    <div class="proto-card-name">—</div>
                    <div class="proto-card-status"></div>
                    <div class="proto-score ai-score">0</div>
                </div>
            </div>
            <div id="line-derecha" class="line-container">
                <div class="player-stack vertical-stack"></div>
                <div class="line-separator-h"></div>
                <div class="ai-stack vertical-stack"></div>
            </div>
        </div>

    </div>

    <!-- Hidden AI hand container (logic.js needs it) -->
    <div id="ai-hand" style="display: none;"></div>
    <!-- Hidden player-hand-col wrapper for ResizeObserver compat -->
    <div id="player-hand-col" style="display: none;"></div>
    <!-- Hidden hand-section wrapper for logic.js compat -->
    <div id="hand-section" style="display: none;"></div>
</div>

<!-- ═══ HAND TOGGLE BUTTON ═══ -->
<button id="hand-toggle" onclick="document.getElementById('hand-overlay').classList.toggle('open')">
    🃏<span class="badge" id="hand-count-badge">0</span>
</button>

<!-- ═══ HAND OVERLAY (slide-up) ═══ -->
<div id="hand-overlay">
    <div class="hand-bar">
        <div style="display: flex; align-items: center; gap: 10px; flex-shrink: 0;">
            <span class="hand-title">Tu mano</span>
            <button id="player-deck-btn" title="Recargar Mazo" style="background: rgba(0,212,255,0.15); color: #00d4ff; border: 1px solid #00d4ff55; padding: 5px 14px; border-radius: 6px; cursor: pointer; font-size: 0.8em; font-weight: bold; font-family: 'Space Mono', monospace;">🔄 Actualizar</button>
            <div id="discard-banner"></div>
            <button id="btn-stop-discard" class="hidden" style="background:#f59e0b;color:#000;border:none;border-radius:5px;padding:4px 14px;cursor:pointer;font-weight:bold;font-size:0.9em;">Detener descarte</button>
        </div>
        <div style="display: flex; align-items: center; gap: 16px; justify-content: center; flex: 1;">
            <div class="stat-group">
                <span style="color: #00d4ff; font-size: 1em;">👤</span>
                <span class="stat-label">Mazo</span>
                <span id="player-deck-count" class="stat-value" style="color: #00d4ff;">0</span>
                <span class="stat-divider"></span>
                <span class="stat-label">Desc.</span>
                <span id="player-trash-count" class="stat-value" style="color: #ef4444;">0</span>
            </div>
            <div class="stat-group">
                <span style="color: #ef4444; font-size: 1em;">🤖</span>
                <span class="stat-label">Mano</span>
                <span id="ai-hand-count" class="stat-value" style="color: #00ff41;">0</span>
                <span class="stat-divider"></span>
                <span class="stat-label">Mazo</span>
                <span id="ai-deck-count" class="stat-value" style="color: #00d4ff;">0</span>
                <span class="stat-divider"></span>
                <span class="stat-label">Desc.</span>
                <span id="ai-trash-count" class="stat-value" style="color: #ef4444;">0</span>
            </div>
        </div>
        <button class="hand-close" onclick="document.getElementById('hand-overlay').classList.remove('open')" style="flex-shrink: 0;">✕</button>
    </div>
    <div id="command-confirm" class="hidden" style="background: rgba(0,0,0,0.85); border: 1px solid #f59e0b; border-radius: 8px; padding: 12px 16px; margin: 10px 20px; text-align: center;">
        <div id="confirm-msg" style="color: #f59e0b; margin-bottom: 10px; font-size: 0.95em;"></div>
        <button id="btn-confirm-yes" style="background:#16a34a;color:#fff;border:none;border-radius:6px;padding:6px 18px;margin-right:8px;cursor:pointer;font-size:0.9em;">Si</button>
        <button id="btn-confirm-no" style="background:#dc2626;color:#fff;border:none;border-radius:6px;padding:6px 18px;cursor:pointer;font-size:0.9em;">No</button>
    </div>
    <div class="hand-content">
        <div id="player-hand" style="display: flex; flex-wrap: nowrap; gap: 10px; min-height: 245px; overflow-x: auto; overflow-y: visible; align-items: center; scrollbar-width: thin; scrollbar-color: #00d4ff44 transparent; padding-bottom: 8px;">
        </div>
    </div>
</div>

<!-- CARD PREVIEW PANEL (centro fijo) -->
<div id="card-preview-panel" class="hidden"></div>

<!-- MODALS (Hidden, controlled by logic.js) -->

<!-- ACTION MODAL: Card selection -->
<div id="action-modal" class="hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); z-index: 1000; display: flex; align-items: center; justify-content: center;">
    <div style="background: rgba(26, 31, 58, 0.95); border: 2px solid #00d4ff; border-radius: 12px; padding: 30px; max-width: 400px; width: 90%;">
        <h2 style="color: #00d4ff; margin-bottom: 20px; text-align: center;">Selecciona Accion</h2>

        <div id="modal-card-preview" style="background: rgba(0, 0, 0, 0.3); border: 1px solid #333; border-radius: 8px; padding: 15px; margin-bottom: 20px; text-align: center; color: #ddd;">
            <!-- Card info populated by logic.js -->
        </div>

        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
            <button id="btn-play-up" style="flex: 1; background: #00d4ff; color: #0a0e27; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold;">
                Bocarriba
            </button>
            <button id="btn-play-down" style="flex: 1; background: #6366f1; color: #fff; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold;">
                Bocabajo
            </button>
        </div>

        <button id="btn-cancel" style="width: 100%; background: #ef4444; color: #fff; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold;">
            Cancelar
        </button>
    </div>
</div>

<!-- CONFIRMATION MODAL -->
<div id="command-confirm-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); z-index: 1001; align-items: center; justify-content: center;">
    <div style="background: rgba(26, 31, 58, 0.95); border: 2px solid #facc15; border-radius: 12px; padding: 30px; max-width: 400px; width: 90%;">
        <h2 style="color: #facc15; margin-bottom: 20px; text-align: center;">Confirmacion</h2>

        <div id="confirm-msg-modal" style="color: #ddd; margin-bottom: 20px; text-align: center;">
            <!-- Message populated by logic.js -->
        </div>

        <div style="display: flex; gap: 10px;">
            <button id="btn-confirm-yes-modal" style="flex: 1; background: #00ff41; color: #0a0e27; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold;">
                Aceptar
            </button>
            <button id="btn-confirm-no-modal" style="flex: 1; background: #ef4444; color: #fff; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold;">
                Cancelar
            </button>
        </div>
    </div>
</div>

<!-- REVEAL MODAL (Amor 4) -->
<div id="reveal-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); z-index: 1003; align-items: center; justify-content: center;">
    <div style="background: rgba(26,31,58,0.97); border: 2px solid #f472b6; border-radius: 12px; padding: 24px; max-width: 480px; width: 90%; text-align: center;">
        <h2 style="color: #f472b6; margin-bottom: 16px;">Carta revelada</h2>
        <div id="reveal-cards-container" style="display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-bottom: 20px;"></div>
        <button id="btn-reveal-close" style="background: #f472b6; color: #0a0e27; border: none; padding: 12px 32px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1rem;">
            Continuar
        </button>
    </div>
</div>

<!-- GAME OVER MODAL -->
<div id="game-over-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); z-index: 1002; align-items: center; justify-content: center;">
    <div style="background: linear-gradient(135deg, rgba(26, 31, 58, 0.97), rgba(10, 14, 39, 0.97)); border: 3px solid #facc15; border-radius: 16px; padding: 48px 40px; max-width: 480px; width: 90%; text-align: center; box-shadow: 0 0 60px rgba(250, 204, 21, 0.3);">

        <div style="font-size: 3em; margin-bottom: 12px;">⚡</div>

        <h1 id="game-over-title" style="font-family: 'Orbitron', monospace; font-size: 2.4em; margin-bottom: 16px; letter-spacing: 3px;">
            VICTORIA!
        </h1>

        <p id="win-reason" style="color: #ccc; font-size: 1em; margin-bottom: 24px; line-height: 1.6;">
            —
        </p>

        <div id="win-stats" style="background: rgba(0,0,0,0.3); border: 1px solid #333; border-radius: 8px; padding: 14px; margin-bottom: 32px; font-size: 0.85em; color: #aaa; line-height: 2;">
        </div>

        <div style="display: flex; gap: 16px; justify-content: center; flex-wrap: wrap;">
            <button onclick="location.href='/src/draft.html'" style="background: linear-gradient(135deg, #00d4ff, #0099cc); color: #0a0e27; border: none; padding: 16px 32px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1em; font-family: 'Orbitron', monospace; letter-spacing: 1px; box-shadow: 0 0 20px rgba(0,212,255,0.4);">
                NUEVO DRAFT
            </button>
            <button onclick="location.href='/src/index.html'" style="background: transparent; color: #aaa; border: 2px solid #555; padding: 16px 32px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1em; font-family: 'Orbitron', monospace; letter-spacing: 1px;">
                PANTALLA PRINCIPAL
            </button>
        </div>
    </div>
</div>

<!-- LOG OVERLAY (slide-in panel) -->
<button id="log-toggle" onclick="document.getElementById('log-overlay').classList.toggle('open')">📋</button>
<div id="log-overlay">
    <div class="log-header">
        <span>Log del Juego</span>
        <button class="log-close" onclick="document.getElementById('log-overlay').classList.remove('open')">✕</button>
    </div>
    <!-- game-log-box wrapper for logic.js compat -->
    <div id="game-log-box" style="flex: 1; padding: 12px; overflow: hidden; display: flex; flex-direction: column;">
        <div id="game-log" style="flex: 1; overflow-y: auto; min-height: 0; display: flex; flex-direction: column; gap: 4px; scrollbar-width: thin; scrollbar-color: #00d4ff33 transparent;">
        </div>
    </div>
</div>

<!-- Scripts -->
<script src="cards-data.js"></script>
<script src="ai-evaluator.js"></script>
<script src="minimax.js"></script>
<script src="abilities-engine.js"></script>
<script src="logic.js"></script>
<script>
    // Mirror last log entry into the status bar
    (function() {
        const log = document.getElementById('game-log');
        const bar = document.getElementById('game-status');
        if (!log || !bar) return;
        new MutationObserver(() => {
            const last = log.querySelector('.log-latest');
            if (last) {
                const txt = last.textContent.trim();
                bar.textContent = txt;
                bar.style.color = last.style.color || '#facc15';
            }
        }).observe(log, { childList: true });
    })();
</script>
<script>
    const DESIGN_WIDTH = 1500;
    const DESIGN_HEIGHT = 920;

    function updateGameZoom() {
        const vw = window.innerWidth;
        const vh = window.innerHeight;
        const scale = Math.min(vw / DESIGN_WIDTH, vh / DESIGN_HEIGHT);
        document.documentElement.style.zoom = scale.toFixed(4);
    }

    function toggleFullscreen() {
        const btn = document.getElementById('btn-fullscreen');
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(() => {});
            btn.textContent = '✕ SALIR';
            sessionStorage.setItem('fs', '1');
        } else {
            document.exitFullscreen().catch(() => {});
            btn.textContent = '⛶ FULLSCREEN';
            sessionStorage.removeItem('fs');
        }
    }

    document.addEventListener('fullscreenchange', () => {
        const btn = document.getElementById('btn-fullscreen');
        if (document.fullscreenElement) {
            btn.textContent = '✕ SALIR';
        } else {
            btn.textContent = '⛶ FULLSCREEN';
            sessionStorage.removeItem('fs');
        }
        setTimeout(updateGameZoom, 50);
    });

    window.addEventListener('resize', updateGameZoom);
    document.addEventListener('DOMContentLoaded', updateGameZoom);
    window.addEventListener('load', updateGameZoom);
    if (sessionStorage.getItem('fs') === '1') {
        document.documentElement.requestFullscreen().catch(() => {
            document.addEventListener('click', function restoreFs() {
                if (sessionStorage.getItem('fs') === '1' && !document.fullscreenElement)
                    document.documentElement.requestFullscreen().catch(() => sessionStorage.removeItem('fs'));
                document.removeEventListener('click', restoreFs);
            });
        });
    }

    // Close hand overlay and log when clicking outside
    document.addEventListener('click', function(e) {
        // Don't close if click is on a card (field or modal) or inside a modal
        const isCard = e.target.closest('.card, .card-field-wrapper, .field-card, #action-modal, #command-confirm-modal, #reveal-modal, #game-over-modal');

        const handOverlay = document.getElementById('hand-overlay');
        const handToggle = document.getElementById('hand-toggle');
        if (handOverlay && handOverlay.classList.contains('open')) {
            if (!handOverlay.contains(e.target) && !handToggle.contains(e.target) && !isCard) {
                handOverlay.classList.remove('open');
            }
        }
        const logOverlay = document.getElementById('log-overlay');
        const logToggle = document.getElementById('log-toggle');
        if (logOverlay && logOverlay.classList.contains('open')) {
            if (!logOverlay.contains(e.target) && !logToggle.contains(e.target)) {
                logOverlay.classList.remove('open');
            }
        }
    });
</script>
</body>
</html>
