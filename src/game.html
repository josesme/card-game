<script>
    const DESIGN_WIDTH = 1500;
    const DESIGN_HEIGHT = 920;

    function updateGameZoom() {
        const vw = window.innerWidth;
        const vh = window.innerHeight;
        const scale = Math.min(vw / DESIGN_WIDTH, vh / DESIGN_HEIGHT);
        document.documentElement.style.zoom = scale.toFixed(4);
    }

    function setFsIcons(isFs) {
        document.getElementById('fs-icon-expand').style.display = isFs ? 'none' : '';
        document.getElementById('fs-icon-shrink').style.display = isFs ? '' : 'none';
    }

    // ── Card preview (click to show, mouseleave to hide) ──
    window.showCardPreview = function(card) {
        const panel = document.getElementById('card-preview-panel');
        const inner = document.getElementById('card-preview-inner');
        if (!panel || !inner || !card) return;
        if (typeof createCardHTML === 'function') {
            inner.innerHTML = createCardHTML(card);
        }
        panel.classList.add('visible');
    };
    window.hideCardPreview = function() {
        const panel = document.getElementById('card-preview-panel');
        if (panel) panel.classList.remove('visible');
    };


    function toggleFullscreen() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(() => {});
            setFsIcons(true);
            sessionStorage.setItem('fs', '1');
        } else {
            document.exitFullscreen().catch(() => {});
            setFsIcons(false);
            sessionStorage.removeItem('fs');
        }
    }

    document.addEventListener('fullscreenchange', () => {
        if (document.fullscreenElement) {
            setFsIcons(true);
        } else {
            setFsIcons(false);
            sessionStorage.removeItem('fs');
        }
        setTimeout(updateGameZoom, 50);
    });

    window.addEventListener('resize', updateGameZoom);
    document.addEventListener('DOMContentLoaded', updateGameZoom);
    window.addEventListener('load', updateGameZoom);
    if (sessionStorage.getItem('fs') === '1') {
        document.documentElement.requestFullscreen().catch(() => {
            document.addEventListener('click', function restoreFs() {
                if (sessionStorage.getItem('fs') === '1' && !document.fullscreenElement)
                    document.documentElement.requestFullscreen().catch(() => sessionStorage.removeItem('fs'));
                document.removeEventListener('click', restoreFs);
            });
        });
    }

    // Hand overlay: hover to open/close
    (function() {
        const overlay = document.getElementById('hand-overlay');
        if (!overlay) return;
        const bar = overlay.querySelector('.hand-bar');

        function hasActiveModal() {
            const ids = ['action-modal', 'command-confirm', 'reveal-modal', 'overlay-select'];
            return ids.some(id => {
                const el = document.getElementById(id);
                return el && !el.classList.contains('hidden');
            });
        }

        // Hover on bar opens (classic mode); overlay itself opens in peek mode
        bar.addEventListener('mouseenter', () => {
            overlay.classList.add('open');
            if (typeof updateHandSidePanels === 'function') updateHandSidePanels();
        });
        overlay.addEventListener('mouseenter', () => {
            if (overlay.classList.contains('peek-mode')) {
                overlay.classList.add('open');
                if (typeof updateHandSidePanels === 'function') updateHandSidePanels();
            }
        });

        // Close immediately on leave; CSS transition (250ms) acts as natural buffer
        // Keep a minimal 80ms guard only to absorb cursor jitter at the edge
        let closeTimer;
        overlay.addEventListener('mouseleave', (e) => {
            // Don't close if cursor exited through the bottom edge (e.g. Windows taskbar)
            if (e.clientY >= window.innerHeight - 2) return;
            closeTimer = setTimeout(() => {
                if (!hasActiveModal()) overlay.classList.remove('open');
            }, 80);
        });
        overlay.addEventListener('mouseenter', () => clearTimeout(closeTimer));
    })();

    // Auto-open hand when action modals appear
    (function() {
        const overlay = document.getElementById('hand-overlay');
        if (!overlay) return;
        ['action-modal', 'command-confirm', 'reveal-modal', 'overlay-select'].forEach(id => {
            const modal = document.getElementById(id);
            if (!modal) return;
            new MutationObserver(() => {
                if (!modal.classList.contains('hidden')) overlay.classList.add('open');
            }).observe(modal, { attributes: true, attributeFilter: ['class'] });
        });
    })();

    // ── ScrambleText: etiquetas estáticas al cargar ─────────────────────────
    window.addEventListener('load', function () {
        if (typeof window._initModalScramble === 'function') window._initModalScramble();
        if (typeof window.scrTxt !== 'function') return;

        var delay = 0;
        function stagger(el, dur, chars) {
            if (!el) return;
            var txt = (el.value !== undefined ? el.value : el.textContent || '').trim();
            if (!txt) return;
            setTimeout(function () { window.scrTxt(el, txt, { duration: dur || 1.0, chars: chars || 'upperCase' }); }, delay);
            delay += 60;
        }

        // Stat labels (Mazo, Desc., Mano...)
        document.querySelectorAll('.stat-label').forEach(function (e) { stagger(e, 0.5); });

        // Etiquetas JUG / IA (spans con color inline en hand-bar) — excluir .stat-value
        // (los contadores son gestionados por updateUI/scrTxt y leer textContent aquí los sobreescribe mid-scramble)
        document.querySelectorAll('#hand-overlay .hand-bar-inner span[style*="color"]:not(.stat-value)').forEach(function (e) {
            if (e.textContent.trim().length <= 4) stagger(e, 0.5);
        });

        // Botones en hand-bar
        ['player-deck-btn', 'btn-stop-discard'].forEach(function (id) { stagger(document.getElementById(id), 0.6); });

        // Botones de cabecera (NUEVO DRAFT, ABANDONAR)
        document.querySelectorAll('#game-container .ui-btn').forEach(function (e) { stagger(e, 0.6); });

        // Modal estático: action-modal (JUGAR CARTA, BOCARRIBA, BOCABAJO, CANCELAR)
        ['btn-play-up', 'btn-play-down', 'btn-cancel'].forEach(function (id) { stagger(document.getElementById(id), 0.6); });
        document.querySelectorAll('#action-modal .effect-title').forEach(function (e) { stagger(e, 0.6); });

        // Modal confirmación (ACEPTAR, CANCELAR)
        ['btn-confirm-yes', 'btn-confirm-no'].forEach(function (id) { stagger(document.getElementById(id), 0.6); });
        document.querySelectorAll('#command-confirm .effect-title').forEach(function (e) { stagger(e, 0.6); });

        // Reveal modal static button
        stagger(document.getElementById('btn-reveal-close'), 0.6);

        // Log header
        document.querySelectorAll('.log-header').forEach(function (e) { stagger(e, 0.5); });
    });

    // Close log when clicking outside
    document.addEventListener('click', function(e) {
        const logOverlay = document.getElementById('log-overlay');
        const logToggle = document.getElementById('log-toggle');
        if (logOverlay && logOverlay.classList.contains('open')) {
            if (!logOverlay.contains(e.target) && !logToggle.contains(e.target)) {
                logOverlay.classList.remove('open');
            }
        }
    });
</script>
<script>
// ── MTX-2 background ─────────────────────────────────────────────
(function () {
    var canvas = document.getElementById('mtx-bg');
    var ctx = canvas.getContext('2d');

    function resize() {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    var FS = 20;
    var drops, speeds, frozen, frozenT;

    function init() {
        var numCols = Math.floor(canvas.width / FS);
        drops   = [];
        speeds  = [];
        frozen  = [];
        frozenT = [];
        for (var i = 0; i < numCols; i++) {
            drops[i]  = Math.random() * -(canvas.height / FS * 1.5);
            speeds[i] = 0.12 + Math.random() * 0.22;
            frozen[i] = false;
            frozenT[i] = 0;
        }
        ctx.fillStyle = '#0b0f1a';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
    init();
    window.addEventListener('resize', init);

    var staticBurst = 0;

    function draw() {
        requestAnimationFrame(draw);
        var W = canvas.width, H = canvas.height;
        var now = Date.now();

        ctx.fillStyle = 'rgba(11,15,26,0.07)';
        ctx.fillRect(0, 0, W, H);

        // Ráfaga horizontal cada ~4s
        if (now - staticBurst > 4000 && Math.random() > 0.995) {
            staticBurst = now;
            ctx.fillStyle = 'rgba(0,245,255,0.06)';
            ctx.fillRect(0, Math.random() * H, W, 4 + Math.random() * 18);
        }

        ctx.font = FS + 'px "JetBrains Mono", monospace';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'top';

        var numCols = Math.floor(W / FS);
        for (var i = 0; i < numCols; i++) {
            // Congelar/descongelar aleatoriamente
            if (!frozen[i] && Math.random() > 0.9985) {
                frozen[i] = true;
                frozenT[i] = now + 600 + Math.random() * 1400;
            }
            if (frozen[i] && now > frozenT[i]) frozen[i] = false;

            var y = Math.floor(drops[i]) * FS;
            if (y < -FS || y > H) {
                if (y > H && Math.random() > 0.985) drops[i] = Math.random() * -40;
                if (!frozen[i]) drops[i] += speeds[i];
                continue;
            }

            if (frozen[i]) {
                if (Math.random() > 0.7) {
                    ctx.shadowBlur = 4;
                    ctx.shadowColor = '#00f5ff';
                    ctx.fillStyle = 'rgba(0,200,220,' + (0.15 + Math.random() * 0.35) + ')';
                    ctx.fillText(Math.random() > 0.5 ? '1' : '0', i * FS, y);
                    ctx.shadowBlur = 0;
                }
                continue;
            }

            ctx.shadowBlur = 10;
            ctx.shadowColor = '#00ffff';
            ctx.fillStyle = '#ffffff';
            ctx.fillText(Math.random() > 0.5 ? '1' : '0', i * FS, y);
            ctx.shadowBlur = 0;
            drops[i] += speeds[i];
        }
    }

    draw();
})();
</script>

<script>
// ── Hand slider ────────────────────────────────────────────────────────────
const HAND_WINDOW = 5;
let handSliderIdx = 0;

function slideHand(dir) {
    const hand = document.getElementById('player-hand');
    if (!hand) return;
    const total = hand.children.length;
    const maxIdx = Math.max(0, total - HAND_WINDOW);
    handSliderIdx = Math.max(0, Math.min(handSliderIdx + dir, maxIdx));
    _applySlider();
}

function updateSlider() {
    const hand = document.getElementById('player-hand');
    if (!hand) return;
    const total = hand.children.length;
    const maxIdx = Math.max(0, total - HAND_WINDOW);
    handSliderIdx = Math.min(handSliderIdx, maxIdx);
    _applySlider();
}

function _applySlider() {
    const hand = document.getElementById('player-hand');
    const vp   = document.getElementById('hand-slider-vp');
    const dots = document.getElementById('hand-slider-dots');
    const prev = document.getElementById('hand-slider-prev');
    const next = document.getElementById('hand-slider-next');
    if (!hand || !vp) return;

    const total = hand.children.length;
    const maxIdx = Math.max(0, total - HAND_WINDOW);

    // Compute card step (card width + gap)
    const cardW = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--hand-card-w')) || 215;
    const gapW  = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--hand-card-gap')) || 10;
    const step  = cardW + gapW;

    hand.style.transform = `translateX(-${handSliderIdx * step}px)`;
    hand.style.justifyContent = total <= HAND_WINDOW ? 'center' : 'flex-start';

    // Edge fades
    vp.classList.toggle('has-prev', handSliderIdx > 0);
    vp.classList.toggle('has-next', handSliderIdx < maxIdx);

    // Arrow state
    if (prev) prev.disabled = handSliderIdx <= 0;
    if (next) next.disabled = handSliderIdx >= maxIdx;

    // Dots — only show when total > HAND_WINDOW
    if (dots) {
        if (total <= HAND_WINDOW) {
            dots.innerHTML = '';
        } else {
            let html = '';
            for (let i = 0; i <= maxIdx; i++) {
                html += `<span class="slider-dot${i === handSliderIdx ? ' active' : ''}" onclick="handSliderIdx=${i};_applySlider()"></span>`;
            }
            dots.innerHTML = html;
        }
    }
}

// Mouse wheel on slider viewport
(function() {
    document.addEventListener('DOMContentLoaded', function() {
        const vp = document.getElementById('hand-slider-vp');
        if (!vp) return;
        vp.addEventListener('wheel', function(e) {
            const hand = document.getElementById('player-hand');
            if (!hand || hand.children.length <= HAND_WINDOW) return;
            e.preventDefault();
            slideHand(e.deltaY > 0 ? 1 : -1);
        }, { passive: false });
    });
})();

// ── Hand mode: peek / classic ──────────────────────────────────────────────
function setHandMode(mode) {
    const overlay = document.getElementById('hand-overlay');
    if (!overlay) return;
    const isPeek = mode === 'peek';
    overlay.classList.toggle('peek-mode', isPeek);
    localStorage.setItem('handMode', mode);
    if (isPeek && typeof updateHandSidePanels === 'function') updateHandSidePanels();
}

// Aplicar modo guardado al cargar (default: peek)
(function() {
    const saved = localStorage.getItem('handMode') ?? 'peek';
    if (saved === 'peek') {
        const overlay = document.getElementById('hand-overlay');
        if (overlay) overlay.classList.add('peek-mode');
    }
})();
</script>
