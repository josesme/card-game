<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMPILE - Juego de Cartas Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            padding: 0;
            overflow: auto;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: #e0e0e0;
            font-family: 'Space Mono', monospace;
        }
        
        #game-container {
            padding: 20px;
            max-width: 1500px;
            margin: 0 auto;
        }

        #btn-fullscreen:hover {
            background: rgba(0,212,255,0.25) !important;
        }

        :fullscreen body, :-webkit-full-screen body {
            overflow: hidden;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

<div id="game-container">
    <!-- HEADER -->
    <header style="text-align: center; margin-bottom: 30px; position: relative;">
        <img src="../images/compile.png" alt="COMPILE" style="height: auto; max-height: 60px; filter: drop-shadow(0 0 12px rgba(0, 212, 255, 0.4));">
        <button id="btn-fullscreen" onclick="toggleFullscreen()" title="Pantalla completa" style="position: absolute; top: 50%; right: 0; transform: translateY(-50%); background: rgba(0,212,255,0.1); border: 1px solid #00d4ff; color: #00d4ff; border-radius: 8px; padding: 8px 14px; cursor: pointer; font-family: 'Orbitron', monospace; font-size: 0.75em; letter-spacing: 1px; transition: background 0.2s;">
            ⛶ FULLSCREEN
        </button>
    </header>

    <!-- GAME BOARD -->
    <div style="background: rgba(26, 31, 58, 0.8); border: 2px solid #00d4ff; border-radius: 12px; padding: 30px; margin-bottom: 30px;">
        
        <!-- LINES (MESA) -->
        <div style="margin-bottom: 30px;">
            <!-- Column headers -->
            <div style="display: grid; grid-template-columns: 1fr 108px 4px 108px 1fr; gap: 8px; align-items: center; padding: 0 0 8px 0; color: #888; font-size: 0.72em; text-transform: uppercase; letter-spacing: 1px;">
                <div style="color: #00d4ff; text-align: right;">← Cartas Jugador</div>
                <div style="color: #00d4ff; text-align: center; font-size: 1.8em; line-height: 1;">👤</div>
                <div></div>
                <div style="color: #ef4444; text-align: center; font-size: 1.8em; line-height: 1;">🤖</div>
                <div style="color: #ef4444; text-align: left;">Cartas IA →</div>
            </div>

            <!-- Line: IZQUIERDA -->
            <div style="display: grid; grid-template-columns: 1fr 108px 4px 108px 1fr; gap: 8px; align-items: stretch; background: rgba(0,0,0,0.3); border: 1px solid #333; border-radius: 8px; padding: 10px; margin-bottom: 8px;">
                <div id="proto-izquierda-player" style="order: 2; border: 2px solid #00d4ff; border-radius: 8px; padding: 10px; background: linear-gradient(135deg, rgba(26,31,58,0.85), rgba(30,41,59,0.7)); text-align: center; box-shadow: 0 0 14px #00d4ff33;">
                    <div class="proto-card-name" style="font-family: 'Orbitron', monospace; font-weight: bold; font-size: 0.94em; color: #00d4ff;">—</div>
                    <div class="proto-card-status" style="font-size: 0.66em; color: #aaa; margin-top: 3px; line-height: 1.3;"></div>
                    <div class="proto-score player-score">0</div>
                </div>
                <div id="line-izquierda" style="display: contents;">
                    <div class="player-stack" style="order: 1; min-height: 80px; display: flex; flex-wrap: wrap; gap: 5px; align-items: center; justify-content: flex-end;"></div>
                    <div class="line-separator" style="order: 3;"></div>
                    <div class="ai-stack" style="order: 5; min-height: 80px; display: flex; flex-wrap: wrap; gap: 5px; align-items: center; justify-content: flex-start;"></div>
                </div>
                <div id="proto-izquierda-ai" style="order: 4; border: 2px solid #ef4444; border-radius: 8px; padding: 10px; background: linear-gradient(135deg, rgba(26,31,58,0.85), rgba(30,41,59,0.7)); text-align: center; box-shadow: 0 0 14px #ef444433;">
                    <div class="proto-card-name" style="font-family: 'Orbitron', monospace; font-weight: bold; font-size: 0.94em; color: #ef4444;">—</div>
                    <div class="proto-card-status" style="font-size: 0.66em; color: #aaa; margin-top: 3px; line-height: 1.3;"></div>
                    <div class="proto-score ai-score">0</div>
                </div>
            </div>

            <!-- Line: CENTRO -->
            <div style="display: grid; grid-template-columns: 1fr 108px 4px 108px 1fr; gap: 8px; align-items: stretch; background: rgba(0,0,0,0.3); border: 1px solid #333; border-radius: 8px; padding: 10px; margin-bottom: 8px;">
                <div id="proto-centro-player" style="order: 2; border: 2px solid #00d4ff; border-radius: 8px; padding: 10px; background: linear-gradient(135deg, rgba(26,31,58,0.85), rgba(30,41,59,0.7)); text-align: center; box-shadow: 0 0 14px #00d4ff33;">
                    <div class="proto-card-name" style="font-family: 'Orbitron', monospace; font-weight: bold; font-size: 0.94em; color: #00d4ff;">—</div>
                    <div class="proto-card-status" style="font-size: 0.66em; color: #aaa; margin-top: 3px; line-height: 1.3;"></div>
                    <div class="proto-score player-score">0</div>
                </div>
                <div id="line-centro" style="display: contents;">
                    <div class="player-stack" style="order: 1; min-height: 80px; display: flex; flex-wrap: wrap; gap: 5px; align-items: center; justify-content: flex-end;"></div>
                    <div class="line-separator" style="order: 3;"></div>
                    <div class="ai-stack" style="order: 5; min-height: 80px; display: flex; flex-wrap: wrap; gap: 5px; align-items: center; justify-content: flex-start;"></div>
                </div>
                <div id="proto-centro-ai" style="order: 4; border: 2px solid #ef4444; border-radius: 8px; padding: 10px; background: linear-gradient(135deg, rgba(26,31,58,0.85), rgba(30,41,59,0.7)); text-align: center; box-shadow: 0 0 14px #ef444433;">
                    <div class="proto-card-name" style="font-family: 'Orbitron', monospace; font-weight: bold; font-size: 0.94em; color: #ef4444;">—</div>
                    <div class="proto-card-status" style="font-size: 0.66em; color: #aaa; margin-top: 3px; line-height: 1.3;"></div>
                    <div class="proto-score ai-score">0</div>
                </div>
            </div>

            <!-- Line: DERECHA -->
            <div style="display: grid; grid-template-columns: 1fr 108px 4px 108px 1fr; gap: 8px; align-items: stretch; background: rgba(0,0,0,0.3); border: 1px solid #333; border-radius: 8px; padding: 10px;">
                <div id="proto-derecha-player" style="order: 2; border: 2px solid #00d4ff; border-radius: 8px; padding: 10px; background: linear-gradient(135deg, rgba(26,31,58,0.85), rgba(30,41,59,0.7)); text-align: center; box-shadow: 0 0 14px #00d4ff33;">
                    <div class="proto-card-name" style="font-family: 'Orbitron', monospace; font-weight: bold; font-size: 0.94em; color: #00d4ff;">—</div>
                    <div class="proto-card-status" style="font-size: 0.66em; color: #aaa; margin-top: 3px; line-height: 1.3;"></div>
                    <div class="proto-score player-score">0</div>
                </div>
                <div id="line-derecha" style="display: contents;">
                    <div class="player-stack" style="order: 1; min-height: 80px; display: flex; flex-wrap: wrap; gap: 5px; align-items: center; justify-content: flex-end;"></div>
                    <div class="line-separator" style="order: 3;"></div>
                    <div class="ai-stack" style="order: 5; min-height: 80px; display: flex; flex-wrap: wrap; gap: 5px; align-items: center; justify-content: flex-start;"></div>
                </div>
                <div id="proto-derecha-ai" style="order: 4; border: 2px solid #ef4444; border-radius: 8px; padding: 10px; background: linear-gradient(135deg, rgba(26,31,58,0.85), rgba(30,41,59,0.7)); text-align: center; box-shadow: 0 0 14px #ef444433;">
                    <div class="proto-card-name" style="font-family: 'Orbitron', monospace; font-weight: bold; font-size: 0.94em; color: #ef4444;">—</div>
                    <div class="proto-card-status" style="font-size: 0.66em; color: #aaa; margin-top: 3px; line-height: 1.3;"></div>
                    <div class="proto-score ai-score">0</div>
                </div>
            </div>
        </div>

        <!-- PLAYER HAND + AI HAND + STATE INFO en la misma fila -->
        <div style="display: flex; align-items: flex-start; gap: 24px; margin-bottom: 10px;">

            <!-- JUGADOR -->
            <div id="player-hand-col" style="flex: 1; min-width: 0;">
                <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 10px; flex-wrap: wrap;">
                    <div style="color: #00d4ff; font-size: 1.1em; text-transform: uppercase; letter-spacing: 1px; flex-shrink: 0;">👤 Jugador</div>
                    <span style="color:#888; font-size:0.9em; flex-shrink:0;">Mazo:</span>
                    <span id="player-deck-count" style="font-family:'Orbitron',monospace; font-size:1em; color:#00d4ff; flex-shrink:0;">0</span>
                    <span style="color:#888; font-size:0.9em; flex-shrink:0;">Desc.:</span>
                    <span id="player-trash-count" style="font-family:'Orbitron',monospace; font-size:1em; color:#ef4444; flex-shrink:0;">0</span>
                    <button id="player-deck-btn" title="Recargar Mazo" style="background: linear-gradient(135deg, #00d4ff, #0099cc); color: #0a0e27; border: none; padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: 0.8em; font-weight: bold; font-family: 'Space Mono', monospace; flex-shrink: 0;">🔄 Actualizar</button>
                    <div style="width:1px; height:1em; background:#444; flex-shrink:0;"></div>
                    <span style="color:#ef4444; font-size:0.9em; text-transform:uppercase; letter-spacing:1px; flex-shrink:0;">🤖 IA</span>
                    <span style="color:#888; font-size:0.9em; flex-shrink:0;">Mano:</span>
                    <span id="ai-hand-count" style="font-family:'Orbitron',monospace; font-weight:900; font-size:1.1em; color:#00ff41; flex-shrink:0;">0</span>
                    <span style="color:#888; font-size:0.9em; flex-shrink:0;">Mazo:</span>
                    <span id="ai-deck-count" style="font-family:'Orbitron',monospace; font-size:1em; color:#00d4ff; flex-shrink:0;">0</span>
                    <span style="color:#888; font-size:0.9em; flex-shrink:0;">Desc.:</span>
                    <span id="ai-trash-count" style="font-family:'Orbitron',monospace; font-size:1em; color:#ef4444; flex-shrink:0;">0</span>
                </div>
                <div id="discard-banner"></div>
                <button id="btn-stop-discard" class="hidden" style="background:#f59e0b;color:#000;border:none;border-radius:5px;padding:4px 14px;margin-bottom:8px;cursor:pointer;font-weight:bold;font-size:0.9em;">Detener descarte</button>
                <div id="command-confirm" class="hidden" style="background: rgba(0,0,0,0.85); border: 1px solid #f59e0b; border-radius: 8px; padding: 12px 16px; margin-bottom: 10px; text-align: center;">
                    <div id="confirm-msg" style="color: #f59e0b; margin-bottom: 10px; font-size: 0.95em;"></div>
                    <button id="btn-confirm-yes" style="background:#16a34a;color:#fff;border:none;border-radius:6px;padding:6px 18px;margin-right:8px;cursor:pointer;font-size:0.9em;">Sí</button>
                    <button id="btn-confirm-no" style="background:#dc2626;color:#fff;border:none;border-radius:6px;padding:6px 18px;cursor:pointer;font-size:0.9em;">No</button>
                </div>
                <div id="player-hand" style="display: flex; flex-wrap: nowrap; gap: 10px; min-height: 245px; overflow-x: auto; overflow-y: visible; align-items: center; scrollbar-width: thin; scrollbar-color: #00d4ff44 transparent; padding-bottom: 2px;">
                    <!-- Player cards populated by logic.js -->
                </div>
            </div>

            <!-- SEPARADOR VERTICAL -->
            <div style="width: 1px; background: #333; align-self: stretch; flex-shrink: 0;"></div>
            <div id="ai-hand" style="display: none;"></div>

            <!-- STATE INFO -->
            <div id="game-log-box" style="flex: 0 0 300px; background: rgba(26, 31, 58, 0.8); border: 1px solid #00d4ff; border-radius: 8px; padding: 15px; display: flex; flex-direction: column;">
                <div style="color: #00d4ff; font-size: 1.1em; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; flex-shrink: 0;">
                    📊 Log del Juego
                </div>
                <div id="game-log" style="flex: 1; overflow-y: auto; min-height: 0; display: flex; flex-direction: column; gap: 4px; scrollbar-width: thin; scrollbar-color: #00d4ff33 transparent;">
                </div>
            </div>

        </div>
    </div>


</div>

<!-- CARD PREVIEW PANEL (centro fijo) -->
<div id="card-preview-panel" class="hidden"></div>

<!-- MODALS (Hidden, controlled by logic.js) -->

<!-- ACTION MODAL: Card selection -->
<div id="action-modal" class="hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); z-index: 1000; display: flex; align-items: center; justify-content: center;">
    <div style="background: rgba(26, 31, 58, 0.95); border: 2px solid #00d4ff; border-radius: 12px; padding: 30px; max-width: 400px; width: 90%;">
        <h2 style="color: #00d4ff; margin-bottom: 20px; text-align: center;">Selecciona Acción</h2>
        
        <div id="modal-card-preview" style="background: rgba(0, 0, 0, 0.3); border: 1px solid #333; border-radius: 8px; padding: 15px; margin-bottom: 20px; text-align: center; color: #ddd;">
            <!-- Card info populated by logic.js -->
        </div>

        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
            <button id="btn-play-up" style="flex: 1; background: #00d4ff; color: #0a0e27; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold;">
                📤 Bocarriba
            </button>
            <button id="btn-play-down" style="flex: 1; background: #6366f1; color: #fff; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold;">
                📥 Bocabajo
            </button>
        </div>

        <button id="btn-cancel" style="width: 100%; background: #ef4444; color: #fff; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold;">
            ❌ Cancelar
        </button>
    </div>
</div>

<!-- CONFIRMATION MODAL -->
<div id="command-confirm" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); z-index: 1001; align-items: center; justify-content: center;">
    <div style="background: rgba(26, 31, 58, 0.95); border: 2px solid #facc15; border-radius: 12px; padding: 30px; max-width: 400px; width: 90%;">
        <h2 style="color: #facc15; margin-bottom: 20px; text-align: center;">⚠️ Confirmación</h2>
        
        <div id="confirm-msg" style="color: #ddd; margin-bottom: 20px; text-align: center;">
            <!-- Message populated by logic.js -->
        </div>

        <div style="display: flex; gap: 10px;">
            <button id="btn-confirm-yes" style="flex: 1; background: #00ff41; color: #0a0e27; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold;">
                ✅ Aceptar
            </button>
            <button id="btn-confirm-no" style="flex: 1; background: #ef4444; color: #fff; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold;">
                ❌ Cancelar
            </button>
        </div>
    </div>
</div>

<!-- REVEAL MODAL (Amor 4) -->
<div id="reveal-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); z-index: 1003; align-items: center; justify-content: center;">
    <div style="background: rgba(26,31,58,0.97); border: 2px solid #f472b6; border-radius: 12px; padding: 24px; max-width: 480px; width: 90%; text-align: center;">
        <h2 style="color: #f472b6; margin-bottom: 16px;">Carta revelada</h2>
        <div id="reveal-cards-container" style="display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-bottom: 20px;"></div>
        <button id="btn-reveal-close" style="background: #f472b6; color: #0a0e27; border: none; padding: 12px 32px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1rem;">
            ✓ Continuar
        </button>
    </div>
</div>

<!-- GAME OVER MODAL -->
<div id="game-over-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); z-index: 1002; align-items: center; justify-content: center;">
    <div style="background: linear-gradient(135deg, rgba(26, 31, 58, 0.97), rgba(10, 14, 39, 0.97)); border: 3px solid #facc15; border-radius: 16px; padding: 48px 40px; max-width: 480px; width: 90%; text-align: center; box-shadow: 0 0 60px rgba(250, 204, 21, 0.3);">

        <div style="font-size: 3em; margin-bottom: 12px;">⚡</div>

        <h1 id="game-over-title" style="font-family: 'Orbitron', monospace; font-size: 2.4em; margin-bottom: 16px; letter-spacing: 3px;">
            ¡VICTORIA!
        </h1>

        <p id="win-reason" style="color: #ccc; font-size: 1em; margin-bottom: 24px; line-height: 1.6;">
            —
        </p>

        <div id="win-stats" style="background: rgba(0,0,0,0.3); border: 1px solid #333; border-radius: 8px; padding: 14px; margin-bottom: 32px; font-size: 0.85em; color: #aaa; line-height: 2;">
        </div>

        <div style="display: flex; gap: 16px; justify-content: center; flex-wrap: wrap;">
            <button onclick="location.href='/src/draft.html'" style="background: linear-gradient(135deg, #00d4ff, #0099cc); color: #0a0e27; border: none; padding: 16px 32px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1em; font-family: 'Orbitron', monospace; letter-spacing: 1px; box-shadow: 0 0 20px rgba(0,212,255,0.4);">
                🔄 NUEVO DRAFT
            </button>
            <button onclick="location.href='/src/index.html'" style="background: transparent; color: #aaa; border: 2px solid #555; padding: 16px 32px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1em; font-family: 'Orbitron', monospace; letter-spacing: 1px;">
                🏠 PANTALLA PRINCIPAL
            </button>
        </div>
    </div>
</div>

<!-- Scripts -->
<script src="cards-data.js"></script>
<script src="ai-evaluator.js"></script>
<script src="minimax.js"></script>
<script src="abilities-engine.js"></script>
<script src="logic.js"></script>
<script>
    (function syncLogHeight() {
        const col = document.getElementById('player-hand-col');
        const box = document.getElementById('game-log-box');
        if (!col || !box) return;
        const update = () => { box.style.maxHeight = col.offsetHeight + 'px'; };
        new ResizeObserver(update).observe(col);
        update();
    })();
</script>
<script>
    const DESIGN_WIDTH = 1500;
    const DESIGN_HEIGHT = 920;

    function updateGameZoom() {
        const vw = window.innerWidth;
        const vh = window.innerHeight;
        const scale = Math.min(vw / DESIGN_WIDTH, vh / DESIGN_HEIGHT);
        document.documentElement.style.zoom = scale.toFixed(4);
    }

    function toggleFullscreen() {
        const btn = document.getElementById('btn-fullscreen');
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(() => {});
            btn.textContent = '✕ SALIR';
            sessionStorage.setItem('fs', '1');
        } else {
            document.exitFullscreen().catch(() => {});
            btn.textContent = '⛶ FULLSCREEN';
            sessionStorage.removeItem('fs');
        }
    }

    document.addEventListener('fullscreenchange', () => {
        const btn = document.getElementById('btn-fullscreen');
        if (document.fullscreenElement) {
            btn.textContent = '✕ SALIR';
        } else {
            btn.textContent = '⛶ FULLSCREEN';
            sessionStorage.removeItem('fs');
        }
        // Small delay so the browser reports the new viewport size
        setTimeout(updateGameZoom, 50);
    });

    window.addEventListener('resize', updateGameZoom);
    document.addEventListener('DOMContentLoaded', updateGameZoom);
    // Fallback for when scripts load late
    window.addEventListener('load', updateGameZoom);
    if (sessionStorage.getItem('fs') === '1') {
        document.documentElement.requestFullscreen().catch(() => {
            document.addEventListener('click', function restoreFs() {
                if (sessionStorage.getItem('fs') === '1' && !document.fullscreenElement)
                    document.documentElement.requestFullscreen().catch(() => sessionStorage.removeItem('fs'));
                document.removeEventListener('click', restoreFs);
            });
        });
    }
</script>
</body>
</html>
