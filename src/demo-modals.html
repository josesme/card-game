<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMPILE - Demo: Effect Overlay</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Teko:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="design-tokens.css">
    <link rel="stylesheet" href="ui-components.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0b0f1a;
            color: #e0e0e0;
            font-family: var(--ui-font);
            min-height: 100vh;
            padding: 24px;
        }

        h1 {
            font-family: var(--ui-font);
            color: var(--ui-cyan);
            font-size: 11px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .subtitle {
            color: var(--ui-text-muted);
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 32px;
        }

        /* ── BOTONES DE DEMO ── */
        .demo-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 40px;
            padding: 16px;
            background: var(--ui-bg-inactive);
            border: 1px solid var(--ui-border-inactive);
        }

        /* ── FONDO SIMULADO (mesa de juego) ── */
        .game-bg {
            background: var(--ui-bg-inactive);
            border: 1px solid var(--ui-border-inactive);
            height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--ui-text-muted);
            font-size: 10px;
            position: relative;
            overflow: hidden;
        }
        .game-bg-text {
            text-align: center;
            line-height: 1.8;
        }

        /* ============================================================
           EFFECT OVERLAY — sistema unificado de feedback visual
           ============================================================ */
        .effect-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.72);
            backdrop-filter: blur(3px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
        }
        .effect-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .effect-panel {
            background: var(--ui-bg);
            border: 1px solid rgba(0,245,255,0.3);
            max-width: 620px;
            width: 94%;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 8px 48px rgba(0,0,0,0.6);
            animation: panel-enter 0.3s ease-out;
        }
        @keyframes panel-enter {
            from { transform: translateY(20px) scale(0.97); opacity: 0; }
            to   { transform: translateY(0) scale(1); opacity: 1; }
        }

        /* ── Header ── */
        .effect-header {
            padding: 18px 22px 14px;
            border-bottom: 1px solid rgba(0,245,255,0.1);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .effect-header-text {
            flex: 1;
        }
        .effect-title {
            font-family: var(--ui-font);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--ui-cyan);
        }
        .effect-subtitle {
            font-size: 10px;
            color: var(--ui-text-muted);
            margin-top: 3px;
        }
        .effect-source {
            font-size: 9px;
            font-weight: 600;
            padding: 3px 8px;
            background: var(--ui-bg-inactive);
            border: 1px solid var(--ui-border-inactive);
            color: var(--ui-text-muted);
            white-space: nowrap;
            letter-spacing: 1px;
        }

        /* ── Card Grid ── */
        .effect-cards {
            padding: 18px 22px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .effect-card {
            width: 120px;
            height: 168px;
            border: 2px solid var(--ui-border-inactive);
            background: var(--ui-bg-inactive);
            cursor: default;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }
        .effect-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top center;
            display: block;
        }

        /* Card states */
        .effect-card.selectable {
            cursor: pointer;
            border-color: var(--ui-cyan);
            box-shadow: 0 0 10px rgba(0,245,255,0.25);
        }
        .effect-card.selectable:hover {
            transform: translateY(-4px);
            box-shadow: 0 0 20px rgba(0,245,255,0.5);
            border-color: var(--ui-cyan);
        }
        .effect-card.selected {
            border-color: var(--ui-cyan);
            box-shadow: 0 0 16px rgba(0,245,255,0.5);
            transform: translateY(-4px);
        }
        .effect-card.selected::after {
            content: '';
            position: absolute;
            top: 4px;
            left: 4px;
            width: 18px;
            height: 18px;
            background: var(--ui-cyan);
            border-radius: 50%;
        }
        .effect-card.readonly {
            opacity: 0.9;
            cursor: default;
        }
        .effect-card.dimmed {
            opacity: 0.35;
            cursor: default;
        }

        /* ── Info strip ── */
        .effect-info {
            padding: 0 22px;
            text-align: center;
        }
        .effect-counter {
            font-size: 10px;
            color: var(--ui-text-muted);
            padding: 8px 0;
            border-top: 1px solid rgba(0,245,255,0.08);
        }
        .effect-counter strong {
            color: var(--ui-cyan);
        }

        /* ── Actions footer ── */
        .effect-actions {
            padding: 14px 22px 18px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        /* ── NOTIFY (toast) ── */
        .effect-notify {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            z-index: 1001;
            background: var(--ui-bg);
            border: 1px solid rgba(0,245,255,0.3);
            padding: 28px 36px;
            text-align: center;
            max-width: 400px;
            width: 85%;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
            box-shadow: 0 8px 48px rgba(0,0,0,0.6);
        }
        .effect-notify.active {
            opacity: 1;
            pointer-events: all;
            transform: translate(-50%, -50%) scale(1);
        }
        .effect-notify .notify-title {
            font-family: var(--ui-font);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 6px;
        }
        .effect-notify .notify-detail {
            font-size: 10px;
            color: var(--ui-text-muted);
            margin-bottom: 4px;
        }
        .effect-notify .notify-card-row {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin: 14px 0 4px;
        }
        .effect-notify .notify-card-mini {
            width: 72px;
            height: 100px;
            border: 2px solid;
            background: var(--ui-bg-inactive);
            overflow: hidden;
        }
        .effect-notify .notify-card-mini img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top center;
            display: block;
        }

        /* Color themes for overlay types */
        .theme-select .effect-header  { border-bottom-color: rgba(0,245,255,0.15); }
        .theme-select .effect-title   { color: var(--ui-cyan); }
        .theme-select .effect-panel   { border-color: rgba(0,245,255,0.3); }

        .theme-reveal .effect-header  { border-bottom-color: rgba(139,92,246,0.15); }
        .theme-reveal .effect-title   { color: var(--ui-purple); }
        .theme-reveal .effect-panel   { border-color: rgba(139,92,246,0.3); }

        .theme-discard .effect-header { border-bottom-color: rgba(217,70,239,0.15); }
        .theme-discard .effect-title  { color: var(--ui-pink); }
        .theme-discard .effect-panel  { border-color: rgba(217,70,239,0.3); }

        .theme-confirm .effect-header { border-bottom-color: rgba(0,245,255,0.15); }
        .theme-confirm .effect-title  { color: var(--ui-cyan); }
        .theme-confirm .effect-panel  { border-color: rgba(0,245,255,0.3); }

        .theme-ai .effect-header      { border-bottom-color: rgba(139,92,246,0.15); }
        .theme-ai .effect-title        { color: var(--ui-purple); }
        .theme-ai .notify-title        { color: var(--ui-purple); }
        .theme-ai                      { border-color: rgba(139,92,246,0.3) !important; }

        .theme-player .notify-title    { color: var(--ui-cyan); }
        .theme-player                  { border-color: rgba(0,245,255,0.3) !important; }

        /* ── Confirm mode ── */
        .effect-confirm-body {
            padding: 24px 22px;
            text-align: center;
        }
        .effect-confirm-body .confirm-text {
            font-size: 10px;
            color: var(--ui-text-muted);
            line-height: 1.6;
        }

        /* ── Section label ── */
        .demo-section {
            color: var(--ui-text-muted);
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 32px 0 12px;
        }

        /* ── Dropdown (Pencil design system) ── */
        .ui-dropdown {
            position: relative;
            width: 100%;
            max-width: 220px;
            font-family: var(--ui-font);
        }
        .ui-dropdown-label {
            font-size: 8px;
            font-weight: 400;
            color: var(--ui-text-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 6px;
        }
        .ui-dropdown-trigger {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 36px;
            padding: 0 12px;
            background: #060e1c;
            border: 1px solid rgba(0,245,255,0.27);
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .ui-dropdown-trigger:hover {
            border-color: rgba(0,245,255,0.5);
        }
        .ui-dropdown-trigger .drop-value {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 10px;
            color: var(--ui-cyan);
        }
        .ui-dropdown-trigger .drop-value .drop-dot {
            width: 6px;
            height: 6px;
            background: var(--ui-cyan);
            flex-shrink: 0;
        }
        .ui-dropdown-trigger .drop-placeholder {
            font-size: 10px;
            color: var(--ui-text-muted);
        }
        .ui-dropdown-trigger .drop-chevron {
            width: 12px;
            height: 12px;
            stroke: var(--ui-cyan);
            stroke-width: 2;
            fill: none;
            transition: transform 0.2s;
        }
        .ui-dropdown.open .drop-chevron {
            transform: rotate(180deg);
        }
        .ui-dropdown-list {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #040c18;
            border: 1px solid rgba(0,245,255,0.13);
            border-top: none;
            z-index: 10;
            display: none;
            max-height: 210px;
            overflow-y: auto;
        }
        .ui-dropdown.open .ui-dropdown-list {
            display: block;
        }
        .ui-dropdown-item {
            display: flex;
            align-items: center;
            gap: 6px;
            height: 30px;
            padding: 0 12px;
            cursor: pointer;
            transition: background 0.15s;
        }
        .ui-dropdown-item .drop-dot {
            width: 6px;
            height: 6px;
            background: #475569;
            flex-shrink: 0;
        }
        .ui-dropdown-item .drop-text {
            font-size: 10px;
            color: #475569;
        }
        .ui-dropdown-item:hover {
            background: rgba(0,245,255,0.06);
        }
        .ui-dropdown-item:hover .drop-dot { background: var(--ui-cyan); }
        .ui-dropdown-item:hover .drop-text { color: var(--ui-cyan); }
        .ui-dropdown-item.active {
            background: rgba(0,245,255,0.09);
        }
        .ui-dropdown-item.active .drop-dot { background: var(--ui-cyan); }
        .ui-dropdown-item.active .drop-text { color: var(--ui-cyan); }
    </style>
</head>
<body>

<h1>EFFECT OVERLAY</h1>
<p class="subtitle">Demo de los 3 modos del sistema unificado de feedback visual</p>

<div class="demo-controls">
    <button class="ui-btn ui-btn--sm ui-btn--danger" onclick="showSelectDiscard()">DESCARTAR 2</button>
    <button class="ui-btn ui-btn--sm" onclick="showSelectFromDeck()">ELEGIR DEL MAZO</button>
    <button class="ui-btn ui-btn--sm" onclick="showSelectEliminate()">ELIMINAR CARTA</button>
    <button class="ui-btn ui-btn--sm ui-btn--purple" onclick="showRevealHand()">VER MANO RIVAL</button>
    <button class="ui-btn ui-btn--sm ui-btn--purple" onclick="showRevealDeck()">REVELAR TOPE MAZO</button>
    <button class="ui-btn ui-btn--sm ui-btn--purple" onclick="showNotifyAI()">IA ELIMINA CARTA</button>
    <button class="ui-btn ui-btn--sm ui-btn--purple" onclick="showNotifyDraw()">IA ROBA 2</button>
    <button class="ui-btn ui-btn--sm" onclick="showConfirm()">CONFIRMAR ACCION</button>
    <button class="ui-btn ui-btn--sm" onclick="showSelectProtocol()">DI UN PROTOCOLO</button>
</div>

<div class="game-bg">
    <div class="game-bg-text">
        (Mesa de juego)<br>
        Los overlays se muestran sobre este fondo
    </div>
</div>

<!-- ============================================================
     OVERLAY: MODO SELECCION
     ============================================================ -->
<div id="overlay-select" class="effect-overlay">
    <div class="effect-panel">
        <div class="effect-header">
            <div class="effect-header-text">
                <div class="effect-title" id="select-title"></div>
                <div class="effect-subtitle" id="select-subtitle"></div>
            </div>
            <div class="effect-source" id="select-source"></div>
        </div>
        <div class="effect-cards" id="select-cards"></div>
        <div class="effect-info">
            <div class="effect-counter" id="select-counter"></div>
        </div>
        <div class="effect-actions" id="select-actions"></div>
    </div>
</div>

<!-- ============================================================
     OVERLAY: MODO REVELAR
     ============================================================ -->
<div id="overlay-reveal" class="effect-overlay">
    <div class="effect-panel">
        <div class="effect-header">
            <div class="effect-header-text">
                <div class="effect-title" id="reveal-title"></div>
                <div class="effect-subtitle" id="reveal-subtitle"></div>
            </div>
            <div class="effect-source" id="reveal-source"></div>
        </div>
        <div class="effect-cards" id="reveal-cards"></div>
        <div class="effect-actions">
            <button class="ui-btn" onclick="closeOverlay('overlay-reveal')">CONTINUAR</button>
        </div>
    </div>
</div>

<!-- ============================================================
     OVERLAY: MODO CONFIRMAR
     ============================================================ -->
<div id="overlay-confirm" class="effect-overlay">
    <div class="effect-panel">
        <div class="effect-header">
            <div class="effect-header-text">
                <div class="effect-title" id="confirm-title"></div>
                <div class="effect-subtitle" id="confirm-subtitle"></div>
            </div>
            <div class="effect-source" id="confirm-source"></div>
        </div>
        <div class="effect-confirm-body">
            <div class="confirm-text" id="confirm-text"></div>
        </div>
        <div class="effect-actions">
            <button class="ui-btn" onclick="closeOverlay('overlay-confirm')">ACEPTAR</button>
            <button class="ui-btn ui-btn--danger" onclick="closeOverlay('overlay-confirm')">CANCELAR</button>
        </div>
    </div>
</div>

<!-- ============================================================
     NOTIFY (toast de IA / feedback rapido)
     ============================================================ -->
<div id="notify-toast" class="effect-notify"></div>


<script>
// ── Image map & helper ──
const PROTOCOL_IMG_MAP = {
    'Espíritu': { en: 'spirit', ed: 1 },
    'Muerte':   { en: 'death',  ed: 1 },
    'Fuego':    { en: 'fire',   ed: 1 },
    'Gravedad': { en: 'gravity', ed: 1 },
    'Vida':     { en: 'life',   ed: 1 },
    'Luz':      { en: 'light',  ed: 1 },
    'Metal':    { en: 'metal',  ed: 1 },
    'Plaga':    { en: 'plague', ed: 1 },
    'Psique':   { en: 'psychic', ed: 1 },
    'Velocidad':{ en: 'speed',  ed: 1 },
    'Agua':     { en: 'water',  ed: 1 },
    'Oscuridad':{ en: 'darkness', ed: 1 },
    'Apatía':   { en: 'apathy', ed: 1 },
    'Odio':     { en: 'hate',   ed: 1 },
    'Amor':     { en: 'love',   ed: 1 },
    'Hielo':    { en: 'ice',    ed: 2 },
    'Tiempo':   { en: 'time',   ed: 2 },
    'Claridad': { en: 'clarity', ed: 2 },
    'Guerra':   { en: 'war',    ed: 2 },
};

function getCardImageUrl(proto, valor) {
    const info = PROTOCOL_IMG_MAP[proto];
    if (!info) return '';
    const folder = info.ed === 1 ? 'Main_1' : 'Main_2';
    return `../images/cards/${folder}/${info.en}_${valor}.jpg`;
}

// ── Datos fake para la demo ──
const FAKE_CARDS = {
    hand: [
        { nombre: 'Fuego 3', valor: 3, proto: 'Fuego', color: '#ef4444' },
        { nombre: 'Agua 2',  valor: 2, proto: 'Agua',  color: '#3b82f6' },
        { nombre: 'Luz 4',   valor: 4, proto: 'Luz',   color: '#fbbf24' },
        { nombre: 'Metal 1', valor: 1, proto: 'Metal', color: '#94a3b8' },
        { nombre: 'Muerte 5',valor: 5, proto: 'Muerte',color: '#6b7280' },
    ],
    deck: [
        { nombre: 'Psique 3', valor: 3, proto: 'Psique', color: '#e879f9' },
        { nombre: 'Vida 2',   valor: 2, proto: 'Vida',   color: '#4ade80' },
        { nombre: 'Odio 4',   valor: 4, proto: 'Odio',   color: '#f87171' },
    ],
    opponent: [
        { nombre: 'Plaga 2',     valor: 2, proto: 'Plaga',     color: '#84cc16' },
        { nombre: 'Velocidad 3', valor: 3, proto: 'Velocidad', color: '#22d3ee' },
        { nombre: 'Espíritu 1',  valor: 1, proto: 'Espíritu',  color: '#c084fc' },
        { nombre: 'Gravedad 4',  valor: 4, proto: 'Gravedad',  color: '#a78bfa' },
    ]
};

function makeCardHTML(card, cls = '') {
    const imgUrl = getCardImageUrl(card.proto, card.valor);
    return `<div class="effect-card ${cls}">
        <img src="${imgUrl}" alt="${card.nombre}">
    </div>`;
}

function closeOverlay(id) {
    document.getElementById(id).classList.remove('active');
    const el = document.getElementById(id);
    el.className = el.className.replace(/theme-\w+/g, '').trim();
    if (!el.classList.contains('effect-overlay') && !el.classList.contains('effect-notify'))
        el.classList.add('effect-overlay');
}

function closeNotify() {
    document.getElementById('notify-toast').classList.remove('active');
    document.getElementById('notify-toast').className = 'effect-notify';
}

// ══════════════════════════════════════════
// MODO SELECCION
// ══════════════════════════════════════════

function showSelectDiscard() {
    const ov = document.getElementById('overlay-select');
    ov.className = 'effect-overlay theme-discard';

    document.getElementById('select-title').textContent = 'DESCARTAR';
    document.getElementById('select-subtitle').textContent = 'Elige 2 cartas de tu mano para descartar';
    document.getElementById('select-source').textContent = 'Tiempo 4';

    let selected = new Set();
    const count = 2;

    function render() {
        document.getElementById('select-cards').innerHTML = FAKE_CARDS.hand.map((c, i) =>
            makeCardHTML(c, selected.has(i) ? 'selected' : 'selectable')
        ).join('');

        document.querySelectorAll('#select-cards .effect-card').forEach((el, i) => {
            el.onclick = () => {
                if (selected.has(i)) selected.delete(i);
                else if (selected.size < count) selected.add(i);
                render();
            };
        });

        document.getElementById('select-counter').innerHTML =
            `Seleccionadas: <strong>${selected.size}</strong> / ${count}`;

        document.getElementById('select-actions').innerHTML = `
            <button class="ui-btn ui-btn--danger" ${selected.size < count ? 'disabled' : ''}
                onclick="closeOverlay('overlay-select')">DESCARTAR</button>
            `;
    }
    render();
    ov.classList.add('active');
}

function showSelectFromDeck() {
    const ov = document.getElementById('overlay-select');
    ov.className = 'effect-overlay theme-select';

    document.getElementById('select-title').textContent = 'ELEGIR DEL MAZO';
    document.getElementById('select-subtitle').textContent = 'Elige 1 carta para jugar';
    document.getElementById('select-source').textContent = 'Tiempo 0';

    let selected = new Set();

    function render() {
        document.getElementById('select-cards').innerHTML = FAKE_CARDS.deck.map((c, i) =>
            makeCardHTML(c, selected.has(i) ? 'selected' : 'selectable')
        ).join('');

        document.querySelectorAll('#select-cards .effect-card').forEach((el, i) => {
            el.onclick = () => {
                selected.clear();
                selected.add(i);
                render();
            };
        });

        document.getElementById('select-counter').innerHTML =
            `Seleccionadas: <strong>${selected.size}</strong> / 1`;

        document.getElementById('select-actions').innerHTML = `
            <button class="ui-btn" ${selected.size < 1 ? 'disabled' : ''}
                onclick="closeOverlay('overlay-select')">JUGAR CARTA</button>
            <button class="ui-btn ui-btn--danger"
                onclick="closeOverlay('overlay-select')">CANCELAR</button>
            `;
    }
    render();
    ov.classList.add('active');
}

function showSelectEliminate() {
    const ov = document.getElementById('overlay-select');
    ov.className = 'effect-overlay theme-select';

    document.getElementById('select-title').textContent = 'ELIMINAR';
    document.getElementById('select-subtitle').textContent = 'Elige 1 carta descubierta del rival para eliminar';
    document.getElementById('select-source').textContent = 'Muerte 3';

    const fieldCards = [
        { nombre: 'Plaga 2', valor: 2, proto: 'Plaga', color: '#84cc16' },
        { nombre: 'Odio 4',  valor: 4, proto: 'Odio',  color: '#f87171' },
        { nombre: 'Hielo 3', valor: 3, proto: 'Hielo', color: '#93c5fd' },
    ];

    let selected = new Set();

    function render() {
        document.getElementById('select-cards').innerHTML = fieldCards.map((c, i) =>
            makeCardHTML(c, selected.has(i) ? 'selected' : 'selectable')
        ).join('');

        document.querySelectorAll('#select-cards .effect-card').forEach((el, i) => {
            el.onclick = () => {
                selected.clear();
                selected.add(i);
                render();
            };
        });

        document.getElementById('select-counter').innerHTML =
            selected.size > 0 ? `<strong>${fieldCards[[...selected][0]].nombre}</strong> sera eliminada` : 'Elige una carta';

        document.getElementById('select-actions').innerHTML = `
            <button class="ui-btn ui-btn--danger" ${selected.size < 1 ? 'disabled' : ''}
                onclick="closeOverlay('overlay-select')">ELIMINAR</button>
            `;
    }
    render();
    ov.classList.add('active');
}

function showSelectProtocol() {
    const ov = document.getElementById('overlay-select');
    ov.className = 'effect-overlay theme-select';

    document.getElementById('select-title').textContent = 'NOMBRAR PROTOCOLO';
    document.getElementById('select-subtitle').textContent = 'Elige un protocolo';
    document.getElementById('select-source').textContent = 'Suerte 2';

    const protos = Object.keys(PROTOCOL_IMG_MAP);
    let chosen = null;

    function render() {
        document.getElementById('select-cards').innerHTML = '';
        document.getElementById('select-counter').innerHTML = '';

        const dropdownHTML = `
            <div style="padding: 8px 22px 14px; display: flex; justify-content: center;">
                <div class="ui-dropdown" id="proto-dropdown">
                    <div class="ui-dropdown-label">PROTOCOLO</div>
                    <div class="ui-dropdown-trigger" id="proto-drop-trigger">
                        ${chosen
                            ? `<span class="drop-value"><span class="drop-dot"></span>${chosen}</span>`
                            : `<span class="drop-placeholder">Seleccionar...</span>`
                        }
                        <svg class="drop-chevron" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
                    </div>
                    <div class="ui-dropdown-list" id="proto-drop-list">
                        ${protos.map(p => `
                            <div class="ui-dropdown-item${chosen === p ? ' active' : ''}" data-proto="${p}">
                                <span class="drop-dot"></span>
                                <span class="drop-text">${p}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            </div>
        `;

        // Insert dropdown before actions
        const actionsEl = document.getElementById('select-actions');
        let dropZone = document.getElementById('select-dropdown-zone');
        if (!dropZone) {
            dropZone = document.createElement('div');
            dropZone.id = 'select-dropdown-zone';
            actionsEl.parentElement.insertBefore(dropZone, actionsEl);
        }
        dropZone.innerHTML = dropdownHTML;

        document.getElementById('select-actions').innerHTML = `
            <button class="ui-btn" ${!chosen ? 'disabled' : ''}
                onclick="closeOverlay('overlay-select')">CONFIRMAR</button>
            <button class="ui-btn ui-btn--danger"
                onclick="closeOverlay('overlay-select')">CANCELAR</button>
        `;

        // Dropdown behavior
        const trigger = document.getElementById('proto-drop-trigger');
        const dd = document.getElementById('proto-dropdown');

        trigger.onclick = (e) => {
            e.stopPropagation();
            dd.classList.toggle('open');
        };

        document.querySelectorAll('#proto-drop-list .ui-dropdown-item').forEach(item => {
            item.onclick = (e) => {
                e.stopPropagation();
                chosen = item.dataset.proto;
                dd.classList.remove('open');
                render();
            };
        });

        // Close dropdown on outside click
        document.addEventListener('click', function closeDD() {
            dd.classList.remove('open');
            document.removeEventListener('click', closeDD);
        });
    }
    render();
    ov.classList.add('active');
}
